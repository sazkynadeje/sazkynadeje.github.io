<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MŮJ PROFIL - KANCELÁŘ NADĚJE</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --neon: #00f2ff; --dark: #0f172a; --card-bg: rgba(255, 255, 255, 0.05); 
            --green: #27ae60; --red: #e74c3c; --transition: all 0.3s ease;
        }
        body { 
            background-color: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 15px; text-align: center; min-height: 100vh;
        }
        .container { max-width: 500px; margin: 0 auto; }
        
        .user-hero { 
            background: linear-gradient(180deg, rgba(0,242,255,0.1) 0%, transparent 100%);
            padding: 30px 20px; border-radius: 40px; margin-bottom: 30px; border: 1px solid rgba(0,242,255,0.2);
        }
        .avatar { 
            width: 80px; height: 80px; background: var(--neon); color: var(--dark); 
            border-radius: 50%; font-size: 2.5em; font-weight: 900; line-height: 80px; margin: 0 auto 15px;
            box-shadow: 0 0 20px rgba(0,242,255,0.4);
        }

        .bet-card { 
            background: var(--card-bg); border-radius: 25px; padding: 20px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.08); text-align: left; position: relative;
            backdrop-filter: blur(10px);
        }
        .status-badge { 
            position: absolute; top: 20px; right: 20px; font-size: 0.65em; font-weight: 900;
            padding: 5px 12px; border-radius: 100px; text-transform: uppercase;
        }
        .paid { background: var(--green); color: #fff; }
        .unpaid { background: var(--red); color: #fff; }
        .evaluated { background: #555; color: #fff; }

        .edit-group { display: flex; gap: 10px; margin-top: 15px; }
        .input-mini { 
            background: #000; border: 1px solid #334155; color: #fff; border-radius: 12px;
            padding: 12px; font-family: inherit; font-size: 1em; text-align: center; outline: none;
        }
        .input-mini:focus { border-color: var(--neon); }
        .btn-save { 
            background: var(--neon); color: var(--dark); border: none; border-radius: 12px;
            padding: 10px 15px; font-weight: 900; cursor: pointer; transition: var(--transition);
        }

        .back-link { display: inline-block; margin-top: 20px; color: var(--neon); text-decoration: none; font-weight: bold; border: 1px solid var(--neon); padding: 10px 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div style="margin: 20px 0;">
            <img src="IMG_8429.png" style="max-width: 100px; filter: drop-shadow(0 0 10px var(--neon));">
        </div>

        <div class="user-hero">
            <div id="uiAvatar" class="avatar">?</div>
            <h2 id="uiName" style="margin:0; text-transform:uppercase; letter-spacing:2px;">HRÁČ</h2>
            <div id="uiPoints" style="color:var(--neon); font-weight:bold; margin-top:5px;">0 NB</div>
        </div>

        <h3 style="text-align:left; padding-left:10px; font-size:0.9em; opacity:0.6; letter-spacing:1px;">MOJE AKTIVNÍ SÁZKY</h3>
        <div id="myBetsList">Načítám tvé tikety...</div>

        <a href="index.html" class="back-link">← ZPĚT DO KANCELÁŘE</a>
    </div>

    <script type="module">
        import { AuthService } from './js/auth.js';
        import { DBService } from './js/database.js';

        const user = AuthService.getUser();
        if (!user) { window.location.href = "index.html"; }

        // Inicializace profilu
        document.getElementById('uiName').innerText = user.name;
        document.getElementById('uiAvatar').innerText = user.name.charAt(0).toUpperCase();

        // Načtení bodů
        firebase.database().ref(`sazkyData_v2/stats/${user.name}`).on('value', s => {
            const data = s.val();
            document.getElementById('uiPoints').innerText = `${data ? (data.celkoveBody || 0) : 0} NB`;
        });

        // NAČTENÍ SÁZEK S FILTREM
        DBService.getMatches(zapasy => {
            const container = document.getElementById('myBetsList');
            container.innerHTML = "";
            let found = false;

            if (!zapasy) return container.innerHTML = "<div style='opacity:0.3; padding:40px;'>Žádné zápasy nejsou vypsány.</div>";

            // Srovnáme zápasy od nejnovějších
            Object.entries(zapasy).reverse().forEach(([mid, m]) => {
                if (!m.sazky) return;

                // Najdeme sázku přihlášeného uživatele v tomto zápase
                const mojeSazka = Object.entries(m.sazky).find(([bid, s]) => s.jmeno === user.name);
                
                if (mojeSazka) {
                    found = true;
                    const [bid, s] = mojeSazka;
                    const deadline = new Date(m.deadline).getTime();
                    const isClosed = Date.now() > deadline;
                    const isEval = m.status === "vyhodnoceno";
                    
                    // Definice odznaku zaplacení
                    let badgeHtml = s.zaplaceno ? 
                        `<span class="status-badge paid">ZAPLACENO ✅</span>` : 
                        `<span class="status-badge unpaid">DLUŽÍŠ ❌</span>`;
                    
                    if(isEval) badgeHtml = `<span class="status-badge evaluated">VYHODNOCENO 🏁</span>`;

                    const card = document.createElement('div');
                    card.className = "bet-card";
                    
                    // HTML OBSAH KARTY
                    let content = `
                        ${badgeHtml}
                        <div style="font-size:0.8em; opacity:0.6; margin-bottom:10px; font-weight:bold; color:var(--neon)">
                            ${m.domaci} vs ${m.hoste}
                        </div>
                    `;

                    // POKUD JE ZÁPAS OTEVŘENÝ -> MOŽNOST EDITACE
                    if (!isClosed && !isEval) {
                        content += `
                            <div class="edit-group">
                                <input type="text" id="tip-${mid}-${bid}" value="${s.tip}" class="input-mini" style="width:65px;" placeholder="0:0">
                                <input type="text" id="str-${mid}-${bid}" value="${s.strelec}" class="input-mini" style="flex:1; text-align:left;" placeholder="Střelec">
                                <button class="btn-save" onclick="saveMyEdit('${mid}', '${bid}')">💾</button>
                            </div>
                            <div style="font-size:0.6em; margin-top:10px; color:var(--neon); opacity:0.8;">
                                Sázku můžeš libovolně měnit do začátku zápasu.
                            </div>
                        `;
                    } else {
                        // POKUD JE ZAVŘENÝ NEBO VYHODNOCENÝ -> JEN INFO
                        content += `
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                                <div style="font-size:1.1em; font-weight:900;">
                                    ${s.tip} <span style="font-weight:normal; opacity:0.4; margin:0 5px;">|</span> ${s.strelec}
                                </div>
                                ${isEval ? `<div style="color:var(--neon); font-weight:900;">VÝSLEDEK ${m.vysledek}</div>` : ''}
                            </div>
                            <div style="font-size:0.65em; margin-top:8px; opacity:0.4; text-transform:uppercase; letter-spacing:1px;">
                                ${isEval ? 'Zápas skončil - Body připsány' : 'Zápas začal - Sázka uzamčena 🔐'}
                            </div>
                        `;
                    }

                    card.innerHTML = content;
                    container.appendChild(card);
                }
            });

            if (!found) container.innerHTML = "<div style='opacity:0.3; padding:40px;'>Zatím nemáš žádné sázky v aktuálních zápasech.</div>";
        });

        // Globální funkce pro uložení
        window.saveMyEdit = async (mid, bid) => {
            const newTip = document.getElementById(`tip-${mid}-${bid}`).value;
            const newStr = document.getElementById(`str-${mid}-${bid}`).value;

            if (!newTip || !newStr) return alert("Musíš vyplnit tip i střelce!");

            try {
                await firebase.database().ref(`sazkyData_v2/zapasy/${mid}/sazky/${bid}`).update({
                    tip: newTip,
                    strelec: newStr
                });
                // Vizuální potvrzení
                const btn = event.target.closest('button');
                const oldText = btn.innerText;
                btn.innerText = "OK";
                setTimeout(() => btn.innerText = oldText, 2000);
            } catch (e) {
                alert("Chyba: " + e.message);
            }
        };
    </script>
</body>
</html>
