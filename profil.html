<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MŮJ PROFIL - KANCELÁŘ NADĚJE</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --neon: #00f2ff; --dark: #0f172a; --card-bg: rgba(255, 255, 255, 0.05); 
            --green: #27ae60; --red: #e74c3c; --transition: all 0.3s ease;
        }
        body { 
            background-color: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 15px; text-align: center; min-height: 100vh;
        }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* Horní karta uživatele */
        .user-hero { 
            background: linear-gradient(180deg, rgba(0,242,255,0.1) 0%, transparent 100%);
            padding: 30px 20px; border-radius: 40px; margin-bottom: 30px; border: 1px solid rgba(0,242,255,0.2);
        }
        .avatar { 
            width: 80px; height: 80px; background: var(--neon); color: var(--dark); 
            border-radius: 50%; font-size: 2.5em; font-weight: 900; line-height: 80px; margin: 0 auto 15px;
            box-shadow: 0 0 20px rgba(0,242,255,0.4);
        }

        /* Karty zápasů v profilu */
        .bet-card { 
            background: var(--card-bg); border-radius: 25px; padding: 20px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.08); text-align: left; position: relative;
            backdrop-filter: blur(10px);
        }
        .status-badge { 
            position: absolute; top: 20px; right: 20px; font-size: 0.65em; font-weight: 900;
            padding: 5px 12px; border-radius: 100px; text-transform: uppercase;
        }
        .paid { background: var(--green); color: #fff; box-shadow: 0 0 10px rgba(39,174,96,0.3); }
        .unpaid { background: var(--red); color: #fff; box-shadow: 0 0 10px rgba(231,76,60,0.3); }

        /* Editační pole */
        .edit-group { display: flex; gap: 10px; margin-top: 15px; }
        .input-mini { 
            background: #000; border: 1px solid #334155; color: #fff; border-radius: 12px;
            padding: 12px; font-family: inherit; font-size: 1em; text-align: center;
        }
        .btn-save { 
            background: var(--neon); color: var(--dark); border: none; border-radius: 12px;
            padding: 10px 15px; font-weight: 900; cursor: pointer; transition: var(--transition);
        }
        .btn-save:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

        .back-link { display: inline-block; margin-top: 20px; color: var(--neon); text-decoration: none; font-weight: bold; }
        
        /* Odznaky - placeholder */
        .badge-bar { display: flex; justify-content: center; gap: 10px; margin-top: 10px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html"><img src="IMG_8429.png" style="max-width: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 5px var(--neon));"></a>

        <div class="user-hero">
            <div id="uiAvatar" class="avatar">?</div>
            <h2 id="uiName" style="margin:0; text-transform:uppercase; letter-spacing:2px;">HRÁČ</h2>
            <div id="uiPoints" style="color:var(--neon); font-weight:bold; margin-top:5px;">0 NB</div>
            <div class="badge-bar" id="uiBadges">
                <span>🌑</span><span>🌑</span><span>🌑</span><span>🌑</span>
            </div>
        </div>

        <h3 style="text-align:left; padding-left:10px; font-size:0.9em; opacity:0.6;">MOJE AKTUÁLNÍ SÁZKY</h3>
        <div id="myBetsList">Načítám tvé tikety...</div>

        <a href="index.html" class="back-link">← ZPĚT NA HLAVNÍ STRÁNKU</a>
    </div>

    <script type="module">
        import { AuthService } from './js/auth.js';
        import { DBService } from './js/database.js';

        const user = AuthService.getUser();
        if (!user) { window.location.href = "index.html"; }

        // Inicializace profilu
        document.getElementById('uiName').innerText = user.name;
        document.getElementById('uiAvatar').innerText = user.name.charAt(0).toUpperCase();

        // Načtení bodů ze statistik
        firebase.database().ref(`sazkyData_v2/stats/${user.name}`).on('value', s => {
            const data = s.val();
            if (data) document.getElementById('uiPoints').innerText = `${data.celkoveBody || 0} NB`;
        });

        // Načtení sázek hráče
        DBService.getMatches(zapasy => {
            const container = document.getElementById('myBetsList');
            container.innerHTML = "";
            let found = false;

            if (!zapasy) return container.innerHTML = "Zatím žádné zápasy.";

            Object.entries(zapasy).reverse().forEach(([mid, m]) => {
                if (!m.sazky) return;

                Object.entries(m.sazky).forEach(([bid, s]) => {
                    // Kontrola podle unikátního ID nebo jména
                    if (s.userId === user.id || s.jmeno === user.name) {
                        found = true;
                        const now = Date.now();
                        const deadline = new Date(m.deadline).getTime();
                        const isClosed = now > deadline;
                        const isPaid = s.zaplaceno || false;

                        const card = document.createElement('div');
                        card.className = "bet-card";
                        card.innerHTML = `
                            <span class="status-badge ${isPaid ? 'paid' : 'unpaid'}">
                                ${isPaid ? 'ZAPLACENO ✅' : 'NEZAPLACENO ❌'}
                            </span>
                            <div style="font-size:0.8em; opacity:0.6; margin-bottom:5px;">${m.domaci} vs ${m.hoste}</div>
                            
                            ${!isClosed ? `
                                <div class="edit-group">
                                    <input type="text" id="tip-${mid}-${bid}" value="${s.tip}" class="input-mini" style="width:60px;" placeholder="0:0">
                                    <input type="text" id="str-${mid}-${bid}" value="${s.strelec}" class="input-mini" style="flex:1; text-align:left;" placeholder="Střelec">
                                    <button class="btn-save" onclick="saveMyEdit('${mid}', '${bid}')">💾</button>
                                </div>
                                <div style="font-size:0.6em; margin-top:10px; color:var(--neon)">Sázku můžeš měnit do začátku zápasu.</div>
                            ` : `
                                <div style="margin-top:10px; font-weight:bold; font-size:1.1em;">
                                    ${s.tip} <span style="font-weight:normal; opacity:0.5; margin:0 10px;">|</span> ${s.strelec}
                                </div>
                                <div style="font-size:0.6em; margin-top:5px; opacity:0.4;">SÁZKY UZAVŘENY 🔐</div>
                            `}
                        `;
                        container.appendChild(card);
                    }
                });
            });

            if (!found) container.innerHTML = "<div style='opacity:0.3; padding:40px;'>Zatím jsi si na nic nevsadil.</div>";
        });

        // Funkce pro uložení změn (Globální pro onclick)
        window.saveMyEdit = async (mid, bid) => {
            const newTip = document.getElementById(`tip-${mid}-${bid}`).value;
            const newStr = document.getElementById(`str-${mid}-${bid}`).value;

            if (!newTip || !newStr) return alert("Doplň tip i střelce!");

            try {
                await firebase.database().ref(`sazkyData_v2/zapasy/${mid}/sazky/${bid}`).update({
                    tip: newTip,
                    strelec: newStr
                });
                alert("Změna uložena! 🎯");
            } catch (e) {
                alert("Chyba při ukládání: " + e.message);
            }
        };
    </script>
</body>
</html>
