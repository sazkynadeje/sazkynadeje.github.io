<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin v3.3 - KANCELÁŘ NADĚJE - FULL VERSION</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="js/stats.js"></script>
    
    <style>
        :root { 
            --blue: #00f2ff; 
            --green: #38a169; 
            --red: #e53e3e; 
            --bg: #0f172a; 
            --text: #ffffff;
            --card-border: rgba(0, 242, 255, 0.2);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            padding: 20px; 
            color: var(--text); 
            margin: 0; 
            line-height: 1.6; 
            background-attachment: fixed;
        }

        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            padding-bottom: 100px;
        }

        /* HEADER & LOGO */
        .admin-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .admin-header img {
            max-width: 180px;
            filter: drop-shadow(0 0 15px var(--blue));
            margin-bottom: 10px;
        }

        /* CARDS */
        .card { 
            background: rgba(30, 41, 59, 0.7); 
            padding: 30px; 
            border-radius: 25px; 
            margin-bottom: 30px; 
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        h2 { 
            border-bottom: 2px solid var(--blue); 
            padding-bottom: 15px; 
            font-size: 1.5em; 
            margin-top: 0; 
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--blue);
        }

        label { 
            display: block; 
            margin-top: 20px; 
            font-weight: 900; 
            font-size: 0.75em; 
            opacity: 0.6; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        input, textarea { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: 1px solid #334155; 
            border-radius: 15px; 
            background: #000; 
            color: #fff; 
            box-sizing: border-box; 
            font-family: inherit;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--blue);
            outline: none;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        /* BUTTONS */
        .btn { 
            padding: 18px; 
            border: none; 
            border-radius: 15px; 
            color: #000; 
            cursor: pointer; 
            width: 100%; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-top: 15px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            letter-spacing: 1px;
        }

        .btn-blue { background: var(--blue); box-shadow: 0 5px 15px rgba(0, 242, 255, 0.3); }
        .btn-green { background: var(--green); color: white; box-shadow: 0 5px 15px rgba(56, 161, 105, 0.3); }
        .btn-red { background: var(--red); color: white; }

        .btn:hover { 
            transform: translateY(-3px); 
            opacity: 0.9; 
            box-shadow: 0 8px 25px rgba(0, 242, 255, 0.5);
        }

        /* MATCH ITEMS */
        .match-item { 
            background: rgba(15, 23, 42, 0.5); 
            border: 1px solid rgba(255,255,255,0.05); 
            padding: 25px; 
            border-radius: 25px; 
            margin-top: 25px; 
            transition: all 0.3s ease;
        }

        .match-item:hover {
            border-color: var(--blue);
            background: rgba(15, 23, 42, 0.8);
        }

        .bet-row { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            background: rgba(0,0,0,0.4); 
            padding: 12px 18px; 
            border-radius: 15px; 
            margin-bottom: 10px; 
            border: 1px solid rgba(255,255,255,0.03); 
        }

        .paid-toggle { 
            padding: 8px 12px; 
            border-radius: 10px; 
            font-size: 0.7em; 
            cursor: pointer; 
            border: none; 
            font-weight: 900;
            min-width: 60px;
        }

        /* TAGS */
        .tag-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            margin: 15px 0; 
            background: rgba(0,0,0,0.5); 
            padding: 15px; 
            border-radius: 15px; 
            min-height: 50px; 
            border: 1px inset rgba(255,255,255,0.05);
        }

        .tag { 
            background: var(--blue); 
            color: #000; 
            padding: 6px 12px; 
            border-radius: 10px; 
            font-weight: 900; 
            font-size: 0.8em; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            animation: tagPop 0.3s ease-out;
        }

        @keyframes tagPop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* MODAL */
        .modal { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 95%; 
            max-width: 550px; 
            background: #1e293b; 
            border-radius: 35px; 
            display: none; 
            z-index: 3000; 
            padding: 40px; 
            border: 2px solid var(--blue); 
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        .modal-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.9); 
            display: none; 
            z-index: 2999; 
            backdrop-filter: blur(5px);
        }

        /* STATUS MESSAGE */
        #statusMsg { 
            display: none; 
            position: fixed; 
            top: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: var(--blue); 
            color: #000; 
            padding: 18px 40px; 
            border-radius: 50px; 
            font-weight: 900; 
            z-index: 9999; 
            box-shadow: 0 0 30px var(--blue); 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        input:disabled { 
            opacity: 0.4; 
            border: 1px dashed #444; 
            cursor: not-allowed; 
        }

        .history-title {
            margin-top: 80px;
            opacity: 0.4;
            font-size: 1.1em;
            text-align: center;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

<div id="statusMsg">AKCE POTVRZENA! 🚀</div>

<div class="container">
    <div class="admin-header">
        <img src="IMG_8429.png" alt="Logo">
        <div style="font-weight: 900; opacity: 0.5; font-size: 0.8em; letter-spacing: 3px;">ADMINISTRACE SYSTÉMU v3.3</div>
    </div>

    <div class="card">
        <h2>💰 Finanční Přehled</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div>
                <label>Přelito z minulých dnů (Kč):</label>
                <input type="number" id="prevBankInput" placeholder="0">
                <button class="btn btn-blue" onclick="saveBank('prevedenyBank', 'prevBankInput')">Uložit Převod</button>
            </div>
            <div>
                <label>Pokladna / Celý Oběh (Kč):</label>
                <input type="number" id="vOběhuInput" placeholder="0">
                <button class="btn btn-blue" onclick="saveBank('vOběhuCelkem', 'vOběhuInput')">Uložit Pokladnu</button>
            </div>
        </div>
        <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px;">
            <label>Bank Naděje (Hlavní Jackpot Sezóny):</label>
            <input type="number" id="nadejeBankInput" placeholder="0">
            <button class="btn btn-blue" onclick="saveBank('bankNadeje', 'nadejeBankInput')">Uložit Jackpot</button>
        </div>
    </div>

    <div class="card">
        <h2>🏒 Vypsat Nové Utkání</h2>
        <div style="display:flex; gap:15px;">
            <div style="flex:3;"><label>Domácí Tým:</label><input type="text" id="d" oninput="autoFlag()" placeholder="Např. Česko"></div>
            <div style="flex:1;"><label>Kód Vlajky:</label><input type="text" id="kd" placeholder="cz"></div>
        </div>
        <div style="display:flex; gap:15px;">
            <div style="flex:3;"><label>Hostující Tým:</label><input type="text" id="h" oninput="autoFlag()" placeholder="Např. Kanada"></div>
            <div style="flex:1;"><label>Kód Vlajky:</label><input type="text" id="kh" placeholder="ca"></div>
        </div>
        <label>Čas Uzávěrky (Deadline):</label>
        <input type="datetime-local" id="dl">
        <button class="btn btn-green" onclick="publishMatch()">Publikovat Zápas</button>
    </div>

    <h2>📊 Aktivní Zápasy a Sázky</h2>
    <div id="activeMatches">Načítám aktuální data...</div>

    <div class="history-title">ARCHIV ZÁPASŮ</div>
    <div id="historyMatches"></div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeModal()"></div>
<div id="evalModal" class="modal">
    <h2 style="text-align:center; border:none; margin-bottom:10px;">VYHODNOCENÍ</h2>
    <div style="text-align:center; opacity:0.6; font-size:0.8em; margin-bottom:20px;">Zadejte finální výsledek zápasu</div>
    
    <div style="display:flex; justify-content:center; align-items:center; gap:20px; margin: 30px 0;">
        <input type="number" id="finalD" style="width:90px; height:80px; text-align:center; font-size:2.5em; border-radius:20px; border:2px solid var(--blue);">
        <span style="font-size:3em; font-weight:900;">:</span>
        <input type="number" id="finalH" style="width:90px; height:80px; text-align:center; font-size:2.5em; border-radius:20px; border:2px solid var(--blue);">
    </div>
    
    <label>Seznam Střelců (Parsováno z Livesportu):</label>
    <div id="finalStrelci" class="tag-container"></div>
    
    <div style="display:flex; gap:12px; margin-bottom:30px;">
        <input type="text" id="addStrelecInput" placeholder="Přidat střelce ručně..." style="margin:0;">
        <button class="btn btn-blue" style="width:auto; margin:0; padding:0 25px;" onclick="addManualTag()">+</button>
    </div>
    
    <button class="btn btn-green" id="confirmEvalBtn" style="font-size:1.2em; padding:25px;">ROZDĚLIT VÝHRY (15/5)</button>
</div>

<script>
    // --- KONFIGURACE FIREBASE ---
    const firebaseConfig = { 
        apiKey: "AIzaSyC-NCdmsgA42FxnopKm92m1y5gUGw_z_uE", 
        authDomain: "nadeje-208bd.firebaseapp.com", 
        databaseURL: "https://nadeje-208bd-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "nadeje-208bd", 
        storageBucket: "nadeje-208bd.firebasestorage.app", 
        messagingSenderId: "688478977789", 
        appId: "1:688478977789:web:512d1520cf96c9e59cc894" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentStrelci = [];

    // --- LOGIKA AUTOMATICKÝCH VLAJEK (Z externího stats.js) ---
    function autoFlag() {
        const dInput = document.getElementById('d').value.trim().toLowerCase();
        const hInput = document.getElementById('h').value.trim().toLowerCase();
        const normalize = (s) => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const seznamStatu = window.vsechnyStaty || [];

        const searchCode = (txt) => {
            if (txt.length < 2) return null;
            const sNorm = normalize(txt);
            const match = seznamStatu.find(s => {
                const nNorm = normalize(s.n.toLowerCase());
                return nNorm.startsWith(sNorm) || nNorm.includes(sNorm);
            });
            return match ? match.c : null;
        };

        const resD = searchCode(dInput);
        const resH = searchCode(hInput);
        if (resD) document.getElementById('kd').value = resD;
        if (resH) document.getElementById('kh').value = resH;
    }

    // --- PUSH NOTIFIKACE (Webpushr) ---
    async function sendPush(title, msg, scheduledDate = null) {
        const key = "082b774147872e56c9f183c31d86c0a8";
        const token = "119028";
        let body = {
            "title": title, "message": msg,
            "target_url": "https://sazkynadeje.github.io/SazkovkaNadeje/",
            "icon": "https://sazkynadeje.github.io/SazkovkaNadeje/IMG_8429.png"
        };
        if (scheduledDate) {
            const d = scheduledDate;
            body.send_at = `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')} ${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}:00`;
        }
        try {
            await fetch('https://api.webpushr.com/v1/notification/send/all', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'webpushrKey': key, 'webpushrAuthToken': token },
                body: JSON.stringify(body)
            });
        } catch(e) { console.error("Push Error", e); }
    }

    // --- FINANČNÍ FUNKCE ---
    function saveBank(path, inputId) {
        const val = parseInt(document.getElementById(inputId).value) || 0;
        db.ref('sazkyData_v2/' + path).set(val).then(() => showStatus("Peníze v DB upraveny! ✅"));
    }

    db.ref('sazkyData_v2/prevedenyBank').on('value', s => document.getElementById('prevBankInput').value = s.val() || 0);
    db.ref('sazkyData_v2/bankNadeje').on('value', s => document.getElementById('nadejeBankInput').value = s.val() || 0);
    db.ref('sazkyData_v2/vOběhuCelkem').on('value', s => document.getElementById('vOběhuInput').value = s.val() || 0);

    // --- MANIPULACE SE SÁZKAMI ---
    async function togglePaid(mid, bid, current) {
        await db.ref(`sazkyData_v2/zapasy/${mid}/sazky/${bid}`).update({ zaplaceno: !current });
    }

    async function updateBet(mid, bid) {
        const tip = document.getElementById(`editTip-${mid}-${bid}`).value;
        const str = document.getElementById(`editStr-${mid}-${bid}`).value;
        await db.ref(`sazkyData_v2/zapasy/${mid}/sazky/${bid}`).update({ tip: tip, strelec: str });
        showStatus("Sázka opravena v DB! 💾");
    }

    // --- HLAVNÍ RENDER ZÁPASŮ ---
    db.ref('sazkyData_v2/zapasy').on('value', snap => {
        const aC = document.getElementById('activeMatches'), hC = document.getElementById('historyMatches');
        aC.innerHTML = ""; hC.innerHTML = "";
        const data = snap.val(); if(!data) return;

        Object.entries(data).reverse().forEach(([mid, m]) => {
            const div = document.createElement('div'); 
            div.className = 'match-item';
            
            let betsHtml = "";
            if (m.sazky) {
                Object.entries(m.sazky).forEach(([bid, s]) => {
                    const isPaid = s.zaplaceno || false;
                    const isEval = m.status === "vyhodnoceno";
                    betsHtml += `
                        <div class="bet-row">
                            <button class="paid-toggle" onclick="togglePaid('${mid}','${bid}',${isPaid})" 
                                    style="background:${isPaid ? '#38a169':'#e53e3e'}; color:white;">
                                ${isPaid ? 'OK' : 'DLUŽÍ'}
                            </button>
                            <div style="flex:1; font-size:0.9em;"><strong>${s.jmeno}</strong></div>
                            <input type="text" id="editTip-${mid}-${bid}" value="${s.tip || s.skore}" ${isEval ? 'disabled' : ''} 
                                   style="width:55px; text-align:center; padding:8px; margin:0;">
                            <input type="text" id="editStr-${mid}-${bid}" value="${s.strelec}" ${isEval ? 'disabled' : ''} 
                                   style="width:90px; padding:8px; margin:0;">
                            ${!isEval ? `<button onclick="updateBet('${mid}','${bid}')" style="background:none; border:none; cursor:pointer; font-size:1.2em;">💾</button>` : ''}
                        </div>`;
                });
            }

            const headerStatus = m.status === 'vyhodnoceno' ? `<span style="color:var(--green)">VYHODNOCENO (${m.vysledek})</span>` : `<span style="color:var(--blue)">AKTIVNÍ</span>`;

            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:10px;">
                    <strong style="color:var(--blue); font-size:1.1em;">${m.domaci} - ${m.hoste}</strong>
                    <div style="font-size:0.7em; font-weight:900;">${headerStatus}</div>
                </div>
                ${betsHtml}
                <div style="margin-top:20px;">
                    ${m.status === 'aktivni' ? `
                        <textarea id="raw-${mid}" placeholder="Sem vlož text z Livesportu (přehled/střelci)..." style="height:60px; font-size:0.85em;"></textarea>
                        <button class="btn btn-blue" onclick="startEval('${mid}')">ZPRACOVAT VÝSLEDEK</button>
                    ` : `
                        <div style="display:flex; gap:10px;">
                            <button class="btn btn-blue" style="flex:1; font-size:0.7em; padding:10px; opacity:0.5;" onclick="db.ref('sazkyData_v2/zapasy/${mid}/status').set('aktivni')">OTEVŘÍT ZÁPAS</button>
                            <button class="btn-red" style="flex:1; font-size:0.7em; padding:10px; background:none; border:1px solid var(--red); border-radius:12px;" onclick="deleteMatch('${mid}')">SMAZAT</button>
                        </div>
                    `}
                </div>`;

            if(m.status === "vyhodnoceno") hC.appendChild(div); else aC.appendChild(div);
        });
    });

    // --- PARSER A EVALUACE ---
    function startEval(mid) {
        const raw = document.getElementById(`raw-${mid}`).value; 
        if(!raw) return alert("Vlož text z Livesportu!");

        // 1. Čištění textu a parsování skóre
        let cleanText = raw.split(/PRODLOUŽENÍ|PENALTY|NÁJEZDY/i)[0];
        const scoreMatch = cleanText.match(/(\d+)\s*[:|-]\s*(\d+)/g);
        
        if(scoreMatch) {
            const lastScore = scoreMatch[scoreMatch.length-1].replace(/\s/g,'').replace('-',':').split(':');
            document.getElementById('finalD').value = lastScore[0];
            document.getElementById('finalH').value = lastScore[1];
        }

        // 2. Parsování střelců (RegEx na minuty a jména)
        currentStrelci = [];
        const lines = cleanText.split('\n');
        lines.forEach(line => {
            if (line.match(/^[\d+]+['.]/)) { // Detekce řádku začínajícího "12." nebo "45+2."
                let name = line.replace(/^[\d+]+['.]\s*/, '').split('(')[0].split(',')[0].replace(/[0-9]/g, '').replace(/[:|-]/g, '').trim();
                if(name.length > 3 && !currentStrelci.includes(name)) {
                    currentStrelci.push(name);
                }
            }
        });

        renderTags();
        document.getElementById('modalOverlay').style.display='block';
        document.getElementById('evalModal').style.display='block';
        document.getElementById('confirmEvalBtn').onclick = () => finishEval(mid);
    }

    async function finishEval(mid) {
        const d = parseInt(document.getElementById('finalD').value);
        const h = parseInt(document.getElementById('finalH').value);
        const fst = currentStrelci.map(s => s.toLowerCase().trim());

        db.ref(`sazkyData_v2`).once('value', async snap => {
            const data = snap.val();
            const z = data.zapasy[mid];
            const sazkyEntries = Object.entries(z.sazky || {});
            
            const bankCount = sazkyEntries.length;
            const rollover = parseInt(data.prevedenyBank) || 0;
            const totalPool = (bankCount * 15) + rollover;
            const currentPokladna = parseInt(data.vOběhuCelkem) || 0;

            // Filtrování vítězů (přesné skóre)
            let winScore = sazkyEntries.filter(([id, s]) => {
                const p = s.tip.split(':');
                return parseInt(p[0]) === d && parseInt(p[1]) === h;
            });

            // Tie-break: Kdo trefil i střelce?
            let winBonus = winScore.filter(([id, s]) => fst.some(r => r.includes(s.strelec.toLowerCase().trim())));
            let finalWinners = winBonus.length > 0 ? winBonus : winScore;
            
            const share = finalWinners.length > 0 ? Math.floor(totalPool / finalWinners.length) : 0;
            const updates = {};

            sazkyEntries.forEach(([sid, s]) => {
                const p = s.tip.split(':');
                const tD = parseInt(p[0]), tH = parseInt(p[1]);
                
                const hitS = (tD === d && tH === h);
                const hitSt = fst.some(r => r.includes(s.strelec.toLowerCase().trim()));
                const hitT = (tD > tH && d > h) || (tD < tH && d < h) || (tD === tH && d === h);
                
                let points = (hitS ? 5 : 0) + (hitSt ? 3 : 0) + (hitT ? 1 : 0);
                const isFinalWinner = finalWinners.some(w => w[0] === sid);
                
                updates[`sazkyData_v2/zapasy/${mid}/sazky/${sid}/stav`] = isFinalWinner ? "🏆" : (hitS ? "✅" : "❌");
                updates[`sazkyData_v2/zapasy/${mid}/sazky/${sid}/vyhra`] = isFinalWinner ? share : 0;
                updates[`sazkyData_v2/zapasy/${mid}/sazky/${sid}/awarded`] = { points, score: hitS?1:0, striker: hitSt?1:0, trend: hitT?1:0 };

                // Bodování do statistik (Atomicky přes transaction)
                db.ref(`sazkyData_v2/stats/${s.jmeno}`).transaction(c => {
                    c = c || {celkoveBody:0, vyhry:0};
                    const oldPts = s.awarded ? (s.awarded.points || 0) : 0;
                    c.celkoveBody = Math.max(0, (c.celkoveBody || 0) - oldPts) + points;
                    c.vyhry = Math.max(0, (c.vyhry || 0) - (s.vyhra || 0)) + (isFinalWinner ? share : 0);
                    return c;
                });
            });

            // Finanční rollover a pokladna
            updates[`sazkyData_v2/prevedenyBank`] = finalWinners.length > 0 ? 0 : totalPool;
            if (finalWinners.length > 0) {
                updates[`sazkyData_v2/vOběhuCelkem`] = Math.max(0, currentPokladna - totalPool);
            }

            updates[`sazkyData_v2/zapasy/${mid}/status`] = "vyhodnoceno";
            updates[`sazkyData_v2/zapasy/${mid}/vysledek`] = `${d}:${h}`;
            updates[`sazkyData_v2/zapasy/${mid}/strelciZapasu`] = currentStrelci;

            await db.ref().update(updates);
            showStatus("Vyhodnoceno a body připsány! 🏁");
            await sendPush("Zápas vyhodnocen! 🏁", `${z.domaci} - ${z.hoste} skončilo ${d}:${h}. Koukni na body!`);
            closeModal();
        });
    }

    // --- PUBLIKACE ---
    async function publishMatch() {
        const d = document.getElementById('d').value, h = document.getElementById('h').value,
              kd = document.getElementById('kd').value, kh = document.getElementById('kh').value, dl = document.getElementById('dl').value;
        if(!d || !h || !dl) return alert("Musíš vyplnit týmy i uzávěrku!");
        
        const matchRef = db.ref('sazkyData_v2/zapasy').push();
        await matchRef.set({ domaci: d, hoste: h, kodD: kd, kodH: kh, deadline: dl, status: "aktivni" });
        
        showStatus("Utkání uveřejněno! ✅");
        await sendPush("Nový zápas vypsán! 🏒", `${d} vs ${h}. Vsaď si včas!`);
        setTimeout(() => location.reload(), 1500);
    }

    // --- UI POMOCNÍCI ---
    function renderTags() {
        const c = document.getElementById('finalStrelci'); c.innerHTML = "";
        currentStrelci.forEach((s, i) => {
            c.innerHTML += `<div class="tag">${s} <span onclick="currentStrelci.splice(${i},1);renderTags()" style="cursor:pointer; font-size:1.4em;">×</span></div>`;
        });
    }
    function addManualTag() {
        const v = document.getElementById('addStrelecInput').value;
        if(v) { currentStrelci.push(v); renderTags(); document.getElementById('addStrelecInput').value = ""; }
    }
    function showStatus(text) {
        const msg = document.getElementById('statusMsg'); msg.innerText = text; msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 3500);
    }
    function closeModal() { document.getElementById('modalOverlay').style.display='none'; document.getElementById('evalModal').style.display='none'; }
    function deleteMatch(id) { if(confirm("Tato akce nenávratně smaže zápas i všechny sázky v něm. Pokračovat?")) db.ref('sazkyData_v2/zapasy/'+id).remove(); }
</script>
</body>
</html>
