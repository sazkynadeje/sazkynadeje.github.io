<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin v3.4 - KANCELÁŘ NADĚJE</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="js/stats.js"></script>
    
    <style>
        :root { 
            --blue: #00f2ff; --green: #38a169; --red: #e53e3e; --bg: #0f172a; --text: #ffffff;
            --card-border: rgba(0, 242, 255, 0.2);
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: var(--text); margin: 0; line-height: 1.6; background-attachment: fixed; }
        .container { max-width: 900px; margin: 0 auto; padding-bottom: 100px; }
        .admin-header { text-align: center; margin-bottom: 30px; }
        .admin-header img { max-width: 180px; filter: drop-shadow(0 0 15px var(--blue)); margin-bottom: 10px; }
        .card { background: rgba(30, 41, 59, 0.7); padding: 30px; border-radius: 25px; margin-bottom: 30px; border: 1px solid var(--card-border); box-shadow: 0 10px 30px rgba(0,0,0,0.3); backdrop-filter: blur(10px); }
        h2 { border-bottom: 2px solid var(--blue); padding-bottom: 15px; font-size: 1.5em; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; color: var(--blue); }
        label { display: block; margin-top: 20px; font-weight: 900; font-size: 0.75em; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #334155; border-radius: 15px; background: #000; color: #fff; box-sizing: border-box; font-family: inherit; font-size: 1em; }
        .btn { padding: 18px; border: none; border-radius: 15px; color: #000; cursor: pointer; width: 100%; font-weight: 900; text-transform: uppercase; margin-top: 15px; transition: 0.3s; letter-spacing: 1px; }
        .btn-blue { background: var(--blue); }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }
        .match-item { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.05); padding: 25px; border-radius: 25px; margin-top: 25px; }
        .bet-row { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.4); padding: 12px 18px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.03); }
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 15px; min-height: 50px; }
        .tag { background: var(--blue); color: #000; padding: 6px 12px; border-radius: 10px; font-weight: 900; font-size: 0.8em; display: flex; align-items: center; gap: 8px; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 550px; background: #1e293b; border-radius: 35px; display: none; z-index: 3000; padding: 40px; border: 2px solid var(--blue); box-shadow: 0 0 100px rgba(0,0,0,0.8); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 2999; backdrop-filter: blur(5px); }
        #statusMsg { display: none; position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: var(--blue); color: #000; padding: 18px 40px; border-radius: 50px; font-weight: 900; z-index: 9999; box-shadow: 0 0 30px var(--blue); }
    </style>
</head>
<body>

<div id="statusMsg">AKCE POTVRZENA! 🚀</div>

<div class="container">
    <div class="admin-header">
        <img src="IMG_8429.png" alt="Logo">
        <div style="font-weight: 900; opacity: 0.5; font-size: 0.8em; letter-spacing: 3px;">ADMINISTRACE MODULÁRNÍ v3.4</div>
    </div>

    <div class="card">
        <h2>💰 Finanční Přehled</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div>
                <label>Přelito z minulých dnů (Kč):</label>
                <input type="number" id="prevBankInput" placeholder="0">
                <button class="btn btn-blue" onclick="window.saveBank('prevedenyBank', 'prevBankInput')">Uložit Převod</button>
            </div>
            <div>
                <label>Pokladna / Celý Oběh (Kč):</label>
                <input type="number" id="vOběhuInput" placeholder="0">
                <button class="btn btn-blue" onclick="window.saveBank('vOběhuCelkem', 'vOběhuInput')">Uložit Pokladnu</button>
            </div>
        </div>
        <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px;">
            <label>Bank Naděje (Jackpot):</label>
            <input type="number" id="nadejeBankInput" placeholder="0">
            <button class="btn btn-blue" onclick="window.saveBank('bankNadeje', 'nadejeBankInput')">Uložit Jackpot</button>
        </div>
    </div>

    <div class="card">
        <h2>🏒 Vypsat Nové Utkání</h2>
        <div style="display:flex; gap:15px;">
            <div style="flex:3;"><label>Domácí Tým:</label><input type="text" id="d" oninput="window.autoFlag()" placeholder="Např. Česko"></div>
            <div style="flex:1;"><label>Kód Vlajky:</label><input type="text" id="kd" placeholder="cz"></div>
        </div>
        <div style="display:flex; gap:15px;">
            <div style="flex:3;"><label>Hostující Tým:</label><input type="text" id="h" oninput="window.autoFlag()" placeholder="Např. Kanada"></div>
            <div style="flex:1;"><label>Kód Vlajky:</label><input type="text" id="kh" placeholder="ca"></div>
        </div>
        <label>Čas Uzávěrky (Deadline):</label>
        <input type="datetime-local" id="dl">
        <button class="btn btn-green" onclick="window.publishMatch()">Publikovat Zápas</button>
    </div>

    <h2>📊 Aktivní Zápasy a Sázky</h2>
    <div id="activeMatches">Načítám aktuální data...</div>

    <div class="history-title">ARCHIV ZÁPASŮ</div>
    <div id="historyMatches"></div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="window.closeModal()"></div>
<div id="evalModal" class="modal">
    <h2 style="text-align:center; border:none; margin-bottom:10px;">VYHODNOCENÍ</h2>
    <div style="display:flex; justify-content:center; gap:20px; margin: 30px 0;">
        <input type="number" id="finalD" style="width:90px; height:80px; text-align:center; font-size:2.5em; border-radius:20px; border:2px solid var(--blue); background:#000; color:#fff;">
        <span style="font-size:3em; font-weight:900;">:</span>
        <input type="number" id="finalH" style="width:90px; height:80px; text-align:center; font-size:2.5em; border-radius:20px; border:2px solid var(--blue); background:#000; color:#fff;">
    </div>
    <label>Střelci zápasu:</label>
    <div id="finalStrelci" class="tag-container"></div>
    <div style="display:flex; gap:12px; margin-bottom:30px;">
        <input type="text" id="addStrelecInput" placeholder="Přidat střelce ručně..." style="margin:0;">
        <button class="btn btn-blue" style="width:auto; margin:0; padding:0 25px;" onclick="window.addManualTag()">+</button>
    </div>
    <button class="btn btn-green" id="confirmEvalBtn" style="font-size:1.2em; padding:25px;">VYHODNOTIT A ROZDĚLIT</button>
</div>

<script type="module">
    import { db } from './js/config.js';
    import { EconomyService } from './js/economy.js';
    import { AdminUI } from './js/admin-ui.js';
    import { AdminEval } from './js/admin-eval.js';

    let currentStrelci = [];
    let currentMid = null;

    // --- INICIALIZACE MODULŮ ---
    EconomyService.init(db);
    db.ref('sazkyData_v2/zapasy').on('value', snap => AdminUI.renderMatches(snap, db));

    // --- FINANČNÍ OPERACE ---
    window.saveBank = (path, inputId) => {
        const val = document.getElementById(inputId).value;
        EconomyService.saveBank(db, path, val).then(() => showStatus("Uloženo v DB! ✅"));
    };

    // --- SPRÁVA SÁZEK ---
    window.adminTogglePaid = (mid, bid, cur) => db.ref(`sazkyData_v2/zapasy/${mid}/sazky/${bid}`).update({ zaplaceno: !cur });
    window.adminUpdateBet = (mid, bid) => {
        const tip = document.getElementById(`editTip-${mid}-${bid}`).value;
        const str = document.getElementById(`editStr-${mid}-${bid}`).value;
        db.ref(`sazkyData_v2/zapasy/${mid}/sazky/${bid}`).update({ tip, strelec: str });
        showStatus("Změny uloženy! 💾");
    };

    // --- AUTOMATICKÉ VLAJKY ---
    window.autoFlag = () => {
        const dVal = document.getElementById('d').value.trim().toLowerCase();
        const hVal = document.getElementById('h').value.trim().toLowerCase();
        const norm = (s) => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const seznam = window.vsechnyStaty || [];
        const find = (t) => {
            if (t.length < 2) return null;
            const res = seznam.find(s => norm(s.n.toLowerCase()).includes(norm(t)));
            return res ? res.c : null;
        };
        const cD = find(dVal), cH = find(hVal);
        if (cD) document.getElementById('kd').value = cD;
        if (cH) document.getElementById('kh').value = cH;
    };

    // --- VYHODNOCENÍ ---
    window.adminStartEval = (mid) => {
        const raw = document.getElementById(`raw-${mid}`).value;
        if(!raw) return alert("Vlož text z Livesportu!");
        const parsed = AdminEval.parseLivesport(raw);
        document.getElementById('finalD').value = parsed.d;
        document.getElementById('finalH').value = parsed.h;
        currentStrelci = parsed.strelci;
        currentMid = mid;
        AdminUI.renderTags(currentStrelci, 'finalStrelci');
        document.getElementById('modalOverlay').style.display='block';
        document.getElementById('evalModal').style.display='block';
        document.getElementById('confirmEvalBtn').onclick = () => finishEval(mid);
    };

    window.adminRemoveTag = (index) => {
        currentStrelci.splice(index, 1);
        AdminUI.renderTags(currentStrelci, 'finalStrelci');
    };

    window.addManualTag = () => {
        const v = document.getElementById('addStrelecInput').value;
        if(v) { currentStrelci.push(v); AdminUI.renderTags(currentStrelci, 'finalStrelci'); document.getElementById('addStrelecInput').value = ""; }
    };

    async function finishEval(mid) {
        const d = parseInt(document.getElementById('finalD').value);
        const h = parseInt(document.getElementById('finalH').value);
        const fst = currentStrelci.map(s => s.toLowerCase().trim());

        db.ref('sazkyData_v2').once('value', async snap => {
            const data = snap.val();
            const sazky = Object.entries(data.zapasy[mid].sazky || {});
            const pool = (sazky.length * 15) + (parseInt(data.prevedenyBank) || 0);

            let winners = sazky.filter(([id, s]) => {
                const p = s.tip.split(':');
                return parseInt(p[0]) === d && parseInt(p[1]) === h;
            });
            let bonus = winners.filter(([id, s]) => fst.some(r => r.includes(s.strelec.toLowerCase().trim())));
            let final = bonus.length > 0 ? bonus : winners;
            const share = final.length > 0 ? Math.floor(pool / final.length) : 0;
            const updates = {};

            sazky.forEach(([sid, s]) => {
                const p = s.tip.split(':'), tD = parseInt(p[0]), tH = parseInt(p[1]);
                const hitS = (tD === d && tH === h), hitSt = fst.some(r => r.includes(s.strelec.toLowerCase().trim()));
                const hitT = (tD > tH && d > h) || (tD < tH && d < h) || (tD === tH && d === h);
                const pts = (hitS ? 5 : 0) + (hitSt ? 3 : 0) + (hitT ? 1 : 0);
                const isW = final.some(w => w[0] === sid);

                updates[`sazkyData_v2/zapasy/${mid}/sazky/${sid}/stav`] = isW ? "🏆" : (hitS ? "✅" : "❌");
                updates[`sazkyData_v2/zapasy/${mid}/sazky/${sid}/vyhra`] = isW ? share : 0;
                updates[`sazkyData_v2/zapasy/${mid}/sazky/${sid}/awarded`] = { points: pts };

                db.ref(`sazkyData_v2/stats/${s.jmeno}`).transaction(c => {
                    c = c || {celkoveBody:0, vyhry:0};
                    const oldPts = s.awarded ? (s.awarded.points || 0) : 0;
                    c.celkoveBody = Math.max(0, (c.celkoveBody || 0) - oldPts) + pts;
                    c.vyhry = Math.max(0, (c.vyhry || 0) - (s.vyhra || 0)) + (isW ? share : 0);
                    return c;
                });
            });

            updates[`sazkyData_v2/prevedenyBank`] = final.length > 0 ? 0 : pool;
            if(final.length > 0) updates[`sazkyData_v2/vOběhuCelkem`] = Math.max(0, (data.vOběhuCelkem || 0) - pool);
            updates[`sazkyData_v2/zapasy/${mid}/status`] = "vyhodnoceno";
            updates[`sazkyData_v2/zapasy/${mid}/vysledek`] = `${d}:${h}`;
            updates[`sazkyData_v2/zapasy/${mid}/strelciZapasu`] = currentStrelci;

            await db.ref().update(updates);
            showStatus("Zápas vyhodnocen! 🏁");
            window.closeModal();
        });
    }

    // --- POMOCNÉ FUNKCE ---
    window.publishMatch = () => {
        const d = document.getElementById('d').value, h = document.getElementById('h').value,
              kd = document.getElementById('kd').value, kh = document.getElementById('kh').value, dl = document.getElementById('dl').value;
        if(!d || !h || !dl) return alert("Vyplň vše!");
        db.ref('sazkyData_v2/zapasy').push().set({ domaci: d, hoste: h, kodD: kd, kodH: kh, deadline: dl, status: "aktivni" })
        .then(() => { showStatus("Publikováno! ✅"); location.reload(); });
    };

    window.adminDeleteMatch = (id) => { if(confirm("Smazat?")) db.ref('sazkyData_v2/zapasy/'+id).remove(); };
    window.adminReopenMatch = (id) => db.ref(`sazkyData_v2/zapasy/${id}/status`).set('aktivni');
    window.closeModal = () => { document.getElementById('modalOverlay').style.display='none'; document.getElementById('evalModal').style.display='none'; };
    
    function showStatus(t) {
        const m = document.getElementById('statusMsg'); m.innerText = t; m.style.display = 'block';
        setTimeout(() => m.style.display = 'none', 3500);
    }
</script>
</body>
</html>
