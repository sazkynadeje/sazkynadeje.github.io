<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KANCELÁŘ NADĚJE</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #0b0f1a;
            --card-bg: rgba(30, 41, 59, 0.4);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* HLAVIČKA JAKO NA OBRÁZKU */
        .header-container {
            width: 100%;
            max-width: 400px;
            margin-top: 10px;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .logo-text {
            color: var(--neon);
            font-weight: 900;
            font-size: 1.6em;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 15px var(--neon);
            margin: 0;
        }

        .bank-info {
            font-size: 0.95em;
            font-weight: 600;
            margin: 5px 0;
            color: var(--neon);
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.4);
        }

        #userWelcome {
            color: var(--neon);
            font-weight: 900;
            font-size: 1.2em;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon);
            margin: 40px 0;
            letter-spacing: 2px;
        }

        /* NEONOVÉ TLAČÍKO KOŠÍKU UPROSTŘED */
        #fabCart {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--neon);
            width: 140px;
            height: 55px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px var(--neon);
            cursor: pointer;
            z-index: 1000;
            border: none;
        }

        .cart-icon {
            font-size: 24px;
            filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
        }

        #fabBadge {
            position: absolute;
            top: -8px;
            right: 40px;
            background: #ff4444;
            color: white;
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 900;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.6);
            border: 2px solid var(--bg);
        }

        /* ADMIN OZUBENÉ KOLEČKO */
        #adminBtn {
            position: fixed;
            bottom: 50px;
            left: 15%;
            font-size: 24px;
            opacity: 0.5;
            cursor: pointer;
            filter: drop-shadow(0 0 5px var(--neon));
            transition: 0.3s;
        }

        #adminBtn:hover { opacity: 1; }

        /* ZÁPASY */
        #matchList { width: 100%; max-width: 400px; }
        
        .match-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 242, 255, 0.15);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        /* LOGIN OVERLAY */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999;
            display: none; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="logo-row">
            <span style="font-size: 2em;">🏛️</span>
            <h1 class="logo-text">KANCELÁŘ NADĚJE</h1>
        </div>
        <div class="bank-info">🍀 BANK NADĚJE: <span id="uiBankNadeje">0</span> Kč</div>
        <div class="bank-info">💰 CELKEM V OBĚHU: <span id="uiCelkovyVklad">0</span> Kč</div>
    </div>

    <div id="userWelcome">HRÁČ: ---</div>

    <div id="matchList">Načítám zápasy...</div>

    <div id="fabCart" style="display:none;" onclick="window.uiOpenCart()">
        <span class="cart-icon">🛒</span>
        <span id="fabBadge">0</span>
    </div>

    <div id="adminBtn" style="display:none;" onclick="window.location.href='admin.html'">⚙️</div>

    <div id="loginOverlay">
        <div style="text-align:center;">
            <h2 style="color:var(--neon); text-shadow: 0 0 10px var(--neon);">KDO JSI?</h2>
            <input type="text" id="loginName" style="padding:15px; border-radius:15px; border:none; width:200px; text-align:center;">
            <br><br>
            <button id="loginBtn" style="padding:15px 40px; background:var(--neon); border:none; border-radius:15px; font-weight:900;">VSTOUPIT</button>
        </div>
    </div>

    <script src="js/notifications.js"></script>

    <script type="module">
        import { db } from './js/config.js';
        import { AuthService } from './js/auth.js';
        import { DBService } from './js/database.js';
        import { EconomyService } from './js/economy.js';
        import { UIRenderer } from './js/ui-render.js';

        let activeDeadlines = {};
        const user = AuthService.getUser();

        if (!user) {
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('loginBtn').onclick = () => {
                const name = document.getElementById('loginName').value.trim();
                if (name) { AuthService.setUser(name); location.reload(); }
            };
        } else {
            document.getElementById('userWelcome').innerText = `HRÁČ: ${user.name.toUpperCase()}`;
            if(["Pepa", "Admin2"].includes(user.name)) document.getElementById('adminBtn').style.display = 'block';
        }

        // Start
        EconomyService.init();
        DBService.getMatches(zapasy => {
            UIRenderer.renderMatches(zapasy, 'matchList', user?.id, user, activeDeadlines);
        });
        UIRenderer.startClock(activeDeadlines);
    </script>
</body>
</html>
