<script type="module">
    import { AuthService } from './js/auth.js';
    import { DBService } from './js/database.js';
    import { EconomyService } from './js/economy.js';
    import { UIRenderer } from './js/ui-render.js';

    let localCart = {};
    let activeDeadlines = {};
    const ALLOWED_ADMINS = ["Pepa", "Admin2"];

    // Inicializace Firebase
    const db = firebase.database();
    const user = AuthService.getUser();
    const uId = user ? user.name.toLowerCase().replace(/\s/g, '') : null;

    // Login logika
    if (!user) {
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('loginBtn').onclick = () => {
            const name = document.getElementById('loginName').value.trim();
            if (name) { AuthService.setUser(name); location.reload(); }
        };
    } else {
        document.getElementById('userWelcome').innerText = `HRÁČ: ${user.name.toUpperCase()}`;
        if(ALLOWED_ADMINS.includes(user.name)) document.getElementById('adminBtn').style.display = 'flex';
    }

    // SPUŠTĚNÍ MODULŮ
    EconomyService.init(db);
    UIRenderer.startClock(activeDeadlines);

    DBService.getMatches(zapasy => {
        UIRenderer.renderMatches(zapasy, 'matchList', uId, user, activeDeadlines);
    });

    // Globální funkce pro UI (zůstávají zde pro snadný přístup z HTML)
    window.actionAdd = (id, mName) => {
        const sD = document.getElementById(`scD-${id}`).value, sH = document.getElementById(`scH-${id}`).value, str = document.getElementById(`str-${id}`).value;
        if(sD==="" || sH==="" || !str) return alert("Doplň tip!");
        localCart[id] = { tip: `${sD}:${sH}`, strelec: str, matchName: mName };
        document.getElementById('fabCart').style.display='flex';
        document.getElementById('fabBadge').innerText = Object.keys(localCart).length;
        alert("Přidáno na tiket.");
    };

    window.uiOpenCart = () => {
        const container = document.getElementById('cartItemsContainer'); container.innerHTML = "";
        let sum = Object.keys(localCart).length * 20;
        Object.entries(localCart).forEach(([id, d]) => {
            container.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-bottom:10px; text-align:left; border-left:4px solid var(--neon);"><small style="opacity:0.5;">${d.matchName}</small><br><b>${d.tip}</b> — ${d.strelec}</div>`;
        });
        document.getElementById('uiCartTotal').innerText = `${sum} Kč`;
        document.getElementById('cartPre').style.display = 'block';
        document.getElementById('cartPost').style.display = 'none';
        document.getElementById('cartModal').style.display = 'block';
    };

    window.uiCloseCart = () => document.getElementById('cartModal').style.display = 'none';

    window.actionSendTicket = async () => {
        const uniqueMatchCount = Object.keys(localCart).length;
        if (uniqueMatchCount === 0) return;
        const sum = uniqueMatchCount * 20;
        const msg = `Sazka_${user.name}`.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const qrUrl = `https://api.paylibo.com/paylibo/generator/czech/image?accountNumber=295511827&bankCode=0300&amount=${sum}&currency=CZK&message=${msg}`;

        document.getElementById('uiQrImage').src = qrUrl;
        document.getElementById('uiPayPrice').innerText = `${sum} Kč`;
        document.getElementById('uiPayMsg').innerText = msg;
        
        document.getElementById('btnDownloadQR').onclick = () => {
            const link = document.createElement('a');
            link.href = qrUrl; link.download = `QR_Sazka_${user.name}.png`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        };

        try {
            const dbRef = db.ref('sazkyData_v2');
            await dbRef.child('bankNadeje').transaction(curr => (curr || 0) + (uniqueMatchCount * 5));
            await dbRef.child('vOběhuCelkem').transaction(curr => (curr || 0) + (uniqueMatchCount * 20));
            await DBService.sendTicket(localCart);
            document.getElementById('cartPre').style.display = 'none';
            document.getElementById('cartPost').style.display = 'block';
            localCart = {};
            document.getElementById('fabCart').style.display = 'none';
        } catch(e) { alert(e.message); }
    };
</script>
