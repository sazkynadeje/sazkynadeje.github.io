<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KANCELÁŘ NADĚJE</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        /* TVŮJ ORIGINÁLNÍ NEONOVÝ STYL */
        :root {
            --neon: #00f2ff;
            --bg: #0b1120;
            --card-bg: rgba(30, 41, 59, 0.5);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LOGO A HLAVIČKA - PŘESNĚ PODLE WEBU */
        .header-section {
            width: 100%;
            max-width: 450px;
            margin-bottom: 30px;
        }

        .title-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .title-row span { font-size: 2.5rem; }

        h1 {
            color: var(--neon);
            text-transform: uppercase;
            font-weight: 900;
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 1px;
            text-shadow: 0 0 15px var(--neon);
        }

        .bank-row {
            color: var(--neon);
            font-weight: 800;
            font-size: 1.1rem;
            margin: 5px 0;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
        }

        #userWelcome {
            margin: 40px 0;
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--neon);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px var(--neon);
        }

        /* ZÁPASY - TVOJE KARTY */
        #matchList {
            width: 100%;
            max-width: 450px;
        }

        .match-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* PLOVOUCÍ NEONOVÝ KOŠÍK - TEN "PILULKOVÝ" TVAR */
        #fabCart {
            position: fixed;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--neon);
            width: 130px;
            height: 55px;
            border-radius: 35px;
            display: none; /* Ukáže se až se sázkou */
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px var(--neon);
            z-index: 9999;
            cursor: pointer;
            border: none;
        }

        #fabBadge {
            position: absolute;
            top: -10px;
            right: 35px;
            background: #ff4444;
            color: white;
            border-radius: 12px;
            padding: 3px 10px;
            font-size: 14px;
            font-weight: 900;
            box-shadow: 0 0 10px rgba(255,0,0,0.5);
            border: 2px solid var(--bg);
        }

        .cart-icon { font-size: 1.8rem; }

        /* ADMIN KOLEČKO */
        #adminBtn {
            position: fixed;
            bottom: 45px;
            left: 15%;
            font-size: 1.8rem;
            opacity: 0.5;
            cursor: pointer;
            filter: drop-shadow(0 0 10px var(--neon));
        }

        /* NOTIFIKACE - TVŮJ MODÁL */
        #n_box_root { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 99999; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="title-row">
            <span>🏛️</span>
            <h1>KANCELÁŘ NADĚJE</h1>
        </div>
        <div class="bank-row">🍀 BANK NADĚJE: <span id="uiBankNadeje">0</span> Kč</div>
        <div class="bank-row">💰 CELKEM V OBĚHU: <span id="uiCelkovyVklad">0</span> Kč</div>
    </div>

    <div id="userWelcome">HRÁČ: ---</div>

    <div id="matchList">Vstupuji do arény...</div>

    <button id="fabCart" onclick="window.uiOpenCart()">
        <span class="cart-icon">🛒</span>
        <span id="fabBadge">0</span>
    </button>

    <div id="adminBtn" style="display:none;" onclick="window.location.href='admin.html'">⚙️</div>

    <script src="js/notifications.js"></script>

    <script type="module">
        import { db } from './js/config.js';
        import { AuthService } from './js/auth.js';
        import { DBService } from './js/database.js';
        import { EconomyService } from './js/economy.js';
        import { UIRenderer } from './js/ui-render.js';

        let activeDeadlines = {};
        const user = AuthService.getUser();

        // Login (Zachováváme tvou funkčnost)
        if (!user) {
            // Zde by byl tvůj login overlay styl
        } else {
            document.getElementById('userWelcome').innerText = `HRÁČ: ${user.name.toUpperCase()}`;
            if(["Pepa", "Admin2"].includes(user.name)) document.getElementById('adminBtn').style.display = 'block';
        }

        // START SYSTÉMU
        EconomyService.init(); 
        UIRenderer.startClock(activeDeadlines);

        DBService.getMatches(zapasy => {
            // Používáme tvoji renderovací logiku z js/ui-render.js
            UIRenderer.renderMatches(zapasy, 'matchList', user?.id, user, activeDeadlines);
            
            // Kontrola košíku pro zobrazení FAB
            if (window.localCart && Object.keys(window.localCart).length > 0) {
                document.getElementById('fabCart').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
