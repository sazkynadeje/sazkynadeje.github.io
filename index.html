<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KANCELÁŘ NADĚJE v2.0</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="IMG_8429.png">

    <script>
        (function(w,d, s, id) {
            if(typeof(w.webpushr)!=='undefined') return;
            w.webpushr=w.webpushr||function(){(w.webpushr.q=w.webpushr.q||[]).push(arguments)};
            var js, fjs = d.getElementsByTagName(s)[0];
            js = d.createElement(s); js.id = id; js.async=1;
            js.src = "https://cdn.webpushr.com/app.min.js";
            fjs.parentNode.appendChild(js);
        }(window,document, 'script', 'webpushr-jssdk'));

        webpushr('setup', {
            'key': 'BAxBwXCacLqMoyihibIMbRI7cZ9HyPD_wd5JRpPBc3MXk9VEezuI_vVR2rfNLuTJ-2-gsnY48LYSToWdz9bTClc',
            'auto_prompt': false
        });
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --neon: #00f2ff; --dark: #0f172a; --card-bg: rgba(255, 255, 255, 0.05); }
        body { background-color: var(--dark); color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; text-align: center; }
        
        /* Horní lišta s ozubeným kolečkem */
        .admin-gear { position: fixed; top: 20px; right: 20px; font-size: 1.8em; text-decoration: none; z-index: 10000; filter: drop-shadow(0 0 5px var(--neon)); transition: transform 0.3s; }
        .admin-gear:hover { transform: rotate(90deg); }

        .header-logo { max-width: 450px; width: 90%; margin: 40px 0 20px 0; filter: drop-shadow(0 0 10px var(--neon)); }
        
        /* Banka a Přepínač */
        .bank-box { background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(0,242,255,0.08) 100%); border: 1px solid rgba(0, 242, 255, 0.4); border-radius: 30px; padding: 25px; margin-bottom: 25px; }
        .bank-main-val { font-size: 2.8em; font-weight: 900; text-shadow: 0 0 20px var(--neon); }

        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .nav-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .nav-btn.active { background: var(--neon); color: var(--dark); border-color: var(--neon); box-shadow: 0 0 15px rgba(0,242,255,0.4); }

        /* Sekce */
        .content-section { display: none; width: 100%; max-width: 600px; margin: 0 auto; }
        .content-section.active { display: block; }

        /* Karty zápasů */
        .match-card { background: var(--card-bg); border-radius: 30px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 25px; padding: 25px; position: relative; overflow: hidden; }
        .flags-wrapper { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 15px 0; }
        .flag-img { width: 85px; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .vs-circle { background: var(--neon); color: var(--dark); border-radius: 50%; width: 40px; height: 40px; line-height: 40px; font-weight: 900; }
        
        /* Žebříček */
        .leaderboard-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 25px; overflow: hidden; }
        .leaderboard-table th { background: rgba(0,242,255,0.1); color: var(--neon); padding: 15px; font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; }
        .leaderboard-table td { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 1.1em; }
        .rank-gold { color: #ffd700; font-weight: bold; text-shadow: 0 0 10px #ffd700; }

        /* Ovládací prvky */
        .score-input { width: 65px; height: 55px; text-align: center; font-weight: 900; font-size: 1.6em; background: #000; border: 2px solid #334155; color: white; border-radius: 15px; }
        .input-field { width: 100%; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); color: white; border-radius: 15px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-action { width: 100%; background: var(--neon); color: var(--dark); border: none; padding: 18px; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        .fab-cart { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; background: var(--neon); color: var(--dark); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 1.8em; z-index: 5000; box-shadow: 0 10px 30px rgba(0,242,255,0.4); }
        .badge { position: absolute; top: -5px; right: -5px; background: #ff4444; color: white; width: 25px; height: 25px; border-radius: 50%; font-size: 0.5em; display: flex; align-items: center; justify-content: center; border: 2px solid var(--dark); }
        
        #loginOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--dark); z-index:40000; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <a href="admin.html" class="admin-gear">⚙️</a>

    <div id="loginOverlay">
        <div style="background:#1e293b; padding:35px; border-radius:30px; text-align:center; border:2px solid var(--neon); width: 85%; max-width: 320px;">
            <h2 style="color:var(--neon); margin-top:0;">PŘIHLÁŠENÍ</h2>
            <input type="text" id="loginName" class="input-field" placeholder="Tvoje jméno">
            <button id="loginBtn" class="btn-action">VSTOUPIT</button>
        </div>
    </div>

    <img src="IMG_8429.png" class="header-logo" alt="LOGO">

    <div class="bank-box">
        <div class="bank-main-val"><span id="uiMainBank">0</span> Kč</div>
        <div id="userWelcome" style="margin-top:10px; color:var(--neon); font-weight:bold; font-size: 0.9em;"></div>
    </div>

    <div class="nav-tabs">
        <button id="tab-matches" class="nav-btn active">ZÁPASY</button>
        <button id="tab-ranking" class="nav-btn">ŽEBŘÍČEK</button>
    </div>

    <div id="section-matches" class="content-section active">
        <div id="matchList">Načítám zápasy...</div>
    </div>

    <div id="section-ranking" class="content-section">
        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Hráč</th>
                    <th>Bank</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>

    <div id="fabCart" class="fab-cart">
        🎟️ <div id="fabBadge" class="badge">0</div>
    </div>

    <script type="module">
        import { AuthService } from './js/auth.js';
        import { DBService } from './js/database.js';

        let cart = {};

        // 1. LOGIN
        let user = AuthService.getUser();
        if (!user) {
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('loginBtn').onclick = () => {
                const name = document.getElementById('loginName').value.trim();
                if (name) {
                    user = AuthService.setUser(name);
                    location.reload();
                }
            };
        } else {
            document.getElementById('userWelcome').innerText = `Hráč: ${user.name}`;
        }

        // 2. PŘEPÍNÁNÍ SEKCÍ
        const tabM = document.getElementById('tab-matches');
        const tabR = document.getElementById('tab-ranking');
        const secM = document.getElementById('section-matches');
        const secR = document.getElementById('section-ranking');

        tabM.onclick = () => {
            tabM.classList.add('active'); tabR.classList.remove('active');
            secM.classList.add('active'); secR.classList.remove('active');
        };
        tabR.onclick = () => {
            tabR.classList.add('active'); tabM.classList.remove('active');
            secR.classList.add('active'); secM.classList.remove('active');
            loadLeaderboard();
        };

        // 3. DATA
        DBService.getBank(val => document.getElementById('uiMainBank').innerText = val);
        
        DBService.getMatches(zapasy => {
            const container = document.getElementById('matchList');
            container.innerHTML = "";
            if (!zapasy) return;

            Object.entries(zapasy).forEach(([id, m]) => {
                if(m.status === "vyhodnoceno") return;
                const card = document.createElement('div');
                card.className = "match-card";
                card.innerHTML = `
                    <div style="color:var(--neon); font-size:0.8em; margin-bottom:12px; font-weight:bold; letter-spacing:1px;">UDÁLOST</div>
                    <div class="flags-wrapper">
                        <div><img class="flag-img" src="https://flagcdn.com/w160/${m.kodD}.png"><br><small>${m.domaci}</small></div>
                        <div class="vs-circle">VS</div>
                        <div><img class="flag-img" src="https://flagcdn.com/w160/${m.kodH}.png"><br><small>${m.hoste}</small></div>
                    </div>
                    <div class="score-row">
                        <input type="number" id="scD-${id}" class="score-input" placeholder="0">
                        <span style="font-size:2em; color:var(--neon)">:</span>
                        <input type="number" id="scH-${id}" class="score-input" placeholder="0">
                    </div>
                    <input type="text" id="striker-${id}" class="input-field" style="margin-top:15px" placeholder="Kdo dá gól?">
                    <button class="btn-action" id="btn-${id}">PŘIDAT NA TIKET (20 Kč)</button>
                `;
                container.appendChild(card);

                document.getElementById(`btn-${id}`).onclick = () => {
                    const sD = document.getElementById(`scD-${id}`).value;
                    const sH = document.getElementById(`scH-${id}`).value;
                    const str = document.getElementById(`striker-${id}`).value;
                    if(sD === "" || sH === "" || !str) return alert("Doplň tip i střelce!");
                    cart[id] = { tip: `${sD}:${sH}`, strelec: str };
                    document.getElementById('fabCart').style.display = 'flex';
                    document.getElementById('fabBadge').innerText = Object.keys(cart).length;
                    alert("Zápas přidán na tiket.");
                };
            });
        });

        function loadLeaderboard() {
            DBService.getUsers(users => {
                const body = document.getElementById('leaderboardBody');
                body.innerHTML = "";
                const sorted = Object.entries(users).sort((a,b) => b[1].bank - a[1].bank);
                sorted.forEach(([id, u], idx) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="${idx === 0 ? 'rank-gold' : ''}">${idx + 1}.</td>
                        <td>${u.name}</td>
                        <td style="font-weight:bold;">${u.bank} Kč</td>
                    `;
                    body.appendChild(row);
                });
            });
        }

        document.getElementById('fabCart').onclick = async () => {
            if (confirm("Odeslat tiket?")) {
                await DBService.sendTicket(cart);
                alert("Tiket odeslán!");
                location.reload();
            }
        };
    </script>

    <script src="js/notifications.js"></script>
</body>
</html>
