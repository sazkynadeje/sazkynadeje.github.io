<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KANCELÁŘ NADĚJE v5.2</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="style.css"> 
    </head>
<body>

    <div class="bank-header">
        <div class="bank-item">🏦 DNES HRAJEME O: <span id="uiMainBank">0</span> Kč</div>
        <div class="bank-item">🍀 BANK NADĚJE: <span id="uiBankNadeje">0</span> Kč</div>
        <div class="bank-item">💰 CELKEM V OBĚHU: <span id="uiCelkovyVklad">0</span> Kč</div>
    </div>

    <div id="userWelcome" style="text-align:center; font-weight:900; color:var(--neon); margin: 20px 0;"></div>

    <div id="matchList" class="container">Načítám zápasy...</div>

    <div id="fabCart" style="display:none; position:fixed; bottom:30px; right:30px; background:var(--neon); color:#000; width:65px; height:65px; border-radius:50%; align-items:center; justify-content:center; font-weight:900; cursor:pointer; z-index:1000; box-shadow: 0 0 20px var(--neon);" onclick="window.uiOpenCart()">
        🛒 <span id="fabBadge" style="position:absolute; top:0; right:0; background:red; color:white; border-radius:50%; padding:2px 7px; font-size:12px;">0</span>
    </div>

    <div id="adminBtn" style="display:none; position:fixed; bottom:30px; left:30px; background:#fff; color:#000; width:50px; height:50px; border-radius:50%; align-items:center; justify-content:center; cursor:pointer; z-index:1000;" onclick="window.location.href='admin.html'">⚙️</div>

    <div id="loginOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center; backdrop-filter:blur(10px);">
        <div style="background:#1e293b; padding:40px; border-radius:30px; text-align:center; border:2px solid var(--neon); max-width:320px; width:90%;">
            <h2 style="color:var(--neon); margin-bottom:20px;">KANCELÁŘ NADĚJE</h2>
            <input type="text" id="loginName" placeholder="Zadej své jméno" style="width:100%; padding:15px; border-radius:15px; border:none; margin-bottom:20px; text-align:center; font-size:1.1em;">
            <button id="loginBtn" style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--neon); color:#000; font-weight:900; cursor:pointer;">VSTOUPIT DO HRY</button>
        </div>
    </div>

    <div id="cartModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div id="cartPre">
                <h2 style="color:var(--neon);">TVŮJ TIKET</h2>
                <div id="cartItemsContainer"></div>
                <div style="margin: 20px 0; font-weight:900; font-size:1.2em;">CELKEM: <span id="uiCartTotal">0 Kč</span></div>
                <button class="btn-confirm" onclick="window.actionSendTicket()" style="background:var(--neon); color:#000; width:100%; padding:20px; border-radius:20px; font-weight:900; border:none;">POTVRDIT A ZAPLATIT</button>
                <button onclick="window.uiCloseCart()" style="background:none; border:none; color:white; margin-top:15px; cursor:pointer; opacity:0.5;">ZRUŠIT</button>
            </div>
            <div id="cartPost" style="display:none;">
                <h2 style="color:var(--neon);">POSLEDNÍ KROK! 📲</h2>
                <p>Nyní naskenuj QR kód a odešli platbu.</p>
                <img id="uiQrImage" style="width:250px; height:250px; background:white; border-radius:20px; padding:10px; margin:20px 0;">
                <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px;">
                    Částka: <strong id="uiPayPrice"></strong><br>
                    Zpráva: <strong id="uiPayMsg"></strong>
                </div>
                <button id="btnDownloadQR" class="btn-confirm" style="margin-top:15px; background:#fff; color:#000;">ULOŽIT QR KÓD</button>
                <button onclick="window.location.reload()" style="background:var(--neon); color:#000; width:100%; padding:20px; border-radius:20px; font-weight:900; border:none; margin-top:10px;">MÁM ZAPLACENO ✅</button>
            </div>
        </div>
    </div>

    <script src="js/notifications.js"></script>

    <script type="module">
        import { db } from './js/config.js';
        import { AuthService } from './js/auth.js';
        import { DBService } from './js/database.js';
        import { EconomyService } from './js/economy.js';
        import { UIRenderer } from './js/ui-render.js';
        import { Utils } from './js/utils.js';

        let localCart = {};
        let activeDeadlines = {};
        const ALLOWED_ADMINS = ["Pepa", "Admin2"];

        const user = AuthService.getUser();
        const uId = user ? user.name.toLowerCase().replace(/\s/g, '') : null;

        // Login logika
        if (!user) {
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('loginBtn').onclick = () => {
                const name = document.getElementById('loginName').value.trim();
                if (name) { 
                    AuthService.setUser(name); 
                    location.reload(); 
                }
            };
        } else {
            document.getElementById('userWelcome').innerText = `HRÁČ: ${user.name.toUpperCase()}`;
            if(ALLOWED_ADMINS.includes(user.name)) {
                document.getElementById('adminBtn').style.display = 'flex';
            }
        }

        // SPUŠTĚNÍ MODULŮ
        EconomyService.init(); 
        UIRenderer.startClock(activeDeadlines);

        DBService.getMatches(zapasy => {
            UIRenderer.renderMatches(zapasy, 'matchList', uId, user, activeDeadlines);
        });

        // Globální funkce (přístupné z HTML)
        window.actionAdd = (id, mName) => {
            const sD = document.getElementById(`scD-${id}`).value, 
                  sH = document.getElementById(`scH-${id}`).value, 
                  str = document.getElementById(`str-${id}`).value;
            
            if(sD==="" || sH==="" || !str) return alert("Doplň tip!");
            
            localCart[id] = { tip: `${sD}:${sH}`, strelec: str, matchName: mName };
            document.getElementById('fabCart').style.display='flex';
            document.getElementById('fabBadge').innerText = Object.keys(localCart).length;
            alert("Přidáno na tiket.");
        };

        window.uiOpenCart = () => {
            const container = document.getElementById('cartItemsContainer'); 
            container.innerHTML = "";
            let sum = Object.keys(localCart).length * 20;
            
            Object.entries(localCart).forEach(([id, d]) => {
                container.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-bottom:10px; text-align:left; border-left:4px solid var(--neon);"><small style="opacity:0.5;">${d.matchName}</small><br><b>${d.tip}</b> — ${d.strelec}</div>`;
            });
            
            document.getElementById('uiCartTotal').innerText = `${sum} Kč`;
            document.getElementById('cartPre').style.display = 'block';
            document.getElementById('cartPost').style.display = 'none';
            document.getElementById('cartModal').style.display = 'block';
        };

        window.uiCloseCart = () => {
            document.getElementById('cartModal').style.display = 'none';
        };

        window.actionSendTicket = async () => {
            const count = Object.keys(localCart).length;
            if (count === 0) return;
            
            const sum = count * 20;
            const qrUrl = Utils.getQrUrl(sum, user.name);
            const msg = `Sazka_${user.name}`.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

            document.getElementById('uiQrImage').src = qrUrl;
            document.getElementById('uiPayPrice').innerText = `${sum} Kč`;
            document.getElementById('uiPayMsg').innerText = msg;

            try {
                // Peněžní transakce
                await db.ref('sazkyData_v2/bankNadeje').transaction(curr => (curr || 0) + (count * 5));
                await db.ref('sazkyData_v2/vOběhuCelkem').transaction(curr => (curr || 0) + (count * 20));
                
                // Odeslání sázek přes DBService
                await DBService.sendTicket(localCart);
                
                document.getElementById('cartPre').style.display = 'none';
                document.getElementById('cartPost').style.display = 'block';
                localCart = {};
                document.getElementById('fabCart').style.display = 'none';
            } catch(e) { 
                alert("Chyba při odesílání: " + e.message); 
            }
        };
    </script>
</body>
</html>
