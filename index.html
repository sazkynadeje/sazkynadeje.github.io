<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KANCELÁŘ NADĚJE</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #0b0f1a;
            --shadow: 0 0 15px rgba(0, 242, 255, 0.6);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* LOGO A HLAVIČKA Z OBRÁZKU */
        .header-box {
            width: 100%;
            max-width: 400px;
            text-align: left;
            margin-top: 10px;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo-row span { font-size: 2.2em; filter: drop-shadow(var(--shadow)); }

        .logo-text {
            color: var(--neon);
            font-weight: 900;
            font-size: 1.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 20px var(--neon), 0 0 40px rgba(0, 242, 255, 0.3);
            margin: 0;
        }

        .bank-stat {
            font-size: 1.1em;
            font-weight: 900;
            color: var(--neon);
            margin: 8px 0;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #userWelcome {
            color: var(--neon);
            font-weight: 900;
            font-size: 1.4em;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--neon);
            margin: 50px 0;
            letter-spacing: 4px;
            text-align: center;
        }

        /* TEN NEONOVÝ "OVÁL" (KOŠÍK) */
        #fabCart {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--neon);
            width: 150px;
            height: 60px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 35px var(--neon), inset 0 0 10px rgba(255,255,255,0.5);
            cursor: pointer;
            z-index: 2000;
            border: none;
            transition: all 0.3s ease;
        }

        #fabCart:active { transform: translateX(-50%) scale(0.9); }

        .cart-img { font-size: 30px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.3)); }

        #fabBadge {
            position: absolute;
            top: -10px;
            right: 40px;
            background: #ff3b3b;
            color: white;
            border-radius: 15px;
            padding: 3px 10px;
            font-size: 14px;
            font-weight: 900;
            box-shadow: 0 0 15px #ff3b3b;
            border: 2px solid var(--bg);
        }

        /* ADMIN KOLEČKO */
        #adminBtn {
            position: fixed;
            bottom: 45px;
            left: 10%;
            font-size: 28px;
            opacity: 0.4;
            color: white;
            cursor: pointer;
            filter: drop-shadow(var(--shadow));
        }

        /* KARTY ZÁPASŮ */
        #matchList { width: 100%; max-width: 400px; }
        
        .match-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        /* MODÁLY A FINÁLNÍ DOPLŇKY */
        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 400px; background: #1a2235; 
            border: 2px solid var(--neon); border-radius: 30px;
            padding: 30px; z-index: 3000; display: none;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>

    <div class="header-box">
        <div class="logo-row">
            <span>🏛️</span>
            <h1 class="logo-text">KANCELÁŘ NADĚJE</h1>
        </div>
        <div class="bank-stat">🍀 BANK NADĚJE: <span id="uiBankNadeje">0</span> Kč</div>
        <div class="bank-stat">💰 CELKEM V OBĚHU: <span id="uiCelkovyVklad">0</span> Kč</div>
    </div>

    <div id="userWelcome">HRÁČ: ---</div>

    <div id="matchList"> Načítám arénu... 🏒</div>

    <div id="fabCart" style="display:none;" onclick="window.uiOpenCart()">
        <span class="cart-img">🛒</span>
        <span id="fabBadge">0</span>
    </div>

    <div id="adminBtn" style="display:none;" onclick="window.location.href='admin.html'">⚙️</div>

    <div id="loginOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:9999; align-items:center; justify-content:center;">
        <div style="text-align:center;">
            <h2 style="color:var(--neon); text-shadow: 0 0 20px var(--neon); font-size: 2em;">VSTUP DO HRY</h2>
            <input type="text" id="loginName" placeholder="Tvé jméno" style="padding:18px; border-radius:20px; border:none; width:250px; text-align:center; font-size:1.2em; background:#111; color:white; border:1px solid var(--neon);">
            <br><br>
            <button id="loginBtn" style="padding:18px 50px; background:var(--neon); border:none; border-radius:20px; font-weight:900; font-size:1.1em; cursor:pointer; box-shadow: 0 0 20px var(--neon);">POTVRDIT</button>
        </div>
    </div>

    <script src="js/notifications.js"></script>

    <script type="module">
        import { db } from './js/config.js';
        import { AuthService } from './js/auth.js';
        import { DBService } from './js/database.js';
        import { EconomyService } from './js/economy.js';
        import { UIRenderer } from './js/ui-render.js';

        let activeDeadlines = {};
        const user = AuthService.getUser();

        if (!user) {
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('loginBtn').onclick = () => {
                const name = document.getElementById('loginName').value.trim();
                if (name) { AuthService.setUser(name); location.reload(); }
            };
        } else {
            document.getElementById('userWelcome').innerText = `HRÁČ: ${user.name.toUpperCase()}`;
            if(["Pepa", "Admin2"].includes(user.name)) document.getElementById('adminBtn').style.display = 'block';
        }

        // Spuštění všeho
        EconomyService.init(); 
        DBService.getMatches(zapasy => {
            UIRenderer.renderMatches(zapasy, 'matchList', user?.id, user, activeDeadlines);
            // Pokud jsou v košíku věci, ukážeme fab
            if (Object.keys(window.localCart || {}).length > 0) document.getElementById('fabCart').style.display = 'flex';
        });
        UIRenderer.startClock(activeDeadlines);

        // Aby fungovalo otevírání košíku z window
        window.uiOpenCart = () => { /* tvoje logika košíku */ alert("Otevírám košík..."); };
    </script>
</body>
</html>
