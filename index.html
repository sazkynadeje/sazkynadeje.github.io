<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANCELÁŘ NADĚJE v4.9.1</title>

    <script>
        (function(w,d, s, id) {
            if(typeof(w.webpushr)!=='undefined') return;
            w.webpushr=w.webpushr||function(){(w.webpushr.q=w.webpushr.q||[]).push(arguments)};
            var js, fjs = d.getElementsByTagName(s)[0];
            js = d.createElement(s); js.id = id; js.async=1;
            js.src = "https://cdn.webpushr.com/app.min.js";
            fjs.parentNode.appendChild(js);
        }(window,document, 'script', 'webpushr-jssdk'));

        webpushr('setup', {
            'key': 'BAxBwXCacLqMoyihibIMbRI7cZ9HyPD_wd5JRpPBc3MXk9VEezuI_vVR2rfNLuTJ-2-gsnY48LYSToWdz9bTClc',
            'auto_prompt': false 
        });
    </script>

    <script src="stats.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        /* TADY ZŮSTÁVÁ TVŮJ KOMPLETNÍ DESIGN v4.9.1 */
        :root { --neon: #00f2ff; --dark: #0f172a; --card-bg: rgba(255, 255, 255, 0.05); --transition-slow: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); --transition-fast: all 0.2s ease; }
        body { background-color: var(--dark); color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; text-align: center; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .admin-lock { position: fixed; top: 20px; right: 20px; width: 48px; height: 48px; background: rgba(15, 23, 42, 0.9); border: 2px solid var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.3em; z-index: 9999; box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); backdrop-filter: blur(10px); }
        .header-logo { max-width: 450px; width: 90%; margin: 20px 0 40px 0; filter: drop-shadow(0 0 10px var(--neon)); animation: neonGlow 4s ease-in-out infinite alternate; }
        @keyframes neonGlow { 0% { filter: drop-shadow(0 0 5px var(--neon)); transform: scale(1); } 100% { filter: drop-shadow(0 0 25px var(--neon)); transform: scale(1.02); } }
        .bank-box { background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(0,242,255,0.08) 100%); border: 1px solid rgba(0, 242, 255, 0.4); border-radius: 30px; padding: 30px; min-width: 300px; margin-bottom: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        .bank-main-val { font-size: 3.2em; font-weight: 900; text-shadow: 0 0 20px var(--neon); }
        .match-card { background: var(--card-bg); border-radius: 35px; border: 1px solid rgba(255, 255, 255, 0.08); margin-bottom: 35px; padding: 30px; cursor: pointer; transition: var(--transition-slow); position: relative; backdrop-filter: blur(15px); text-align: center; }
        .flags-wrapper { display: flex; justify-content: center; align-items: center; gap: 25px; margin: 25px 0; }
        .flag-img { width: 110px; border-radius: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); animation: flagWave 3s ease-in-out infinite; transform-origin: left center; }
        @keyframes flagWave { 0%, 100% { transform: rotateY(0deg); } 50% { transform: rotateY(35deg) scale(1.05); } }
        .vs-circle { background: var(--neon); color: var(--dark); border-radius: 50%; width: 50px; height: 50px; line-height: 50px; font-weight: 900; }
        .score-input { width: 85px; height: 75px; text-align: center; font-weight: 900; font-size: 2.2em; background: #000; border: 3px solid #334155; color: #fff; border-radius: 22px; }
        .input-field { width: 100%; padding: 18px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 20px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-add-ticket { width: 100%; background: var(--neon); color: var(--dark); border: none; padding: 22px; border-radius: 20px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .fab-cart { position: fixed; bottom: 35px; right: 35px; width: 75px; height: 75px; background: var(--neon); color: var(--dark); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 2em; z-index: 5000; box-shadow: 0 15px 40px rgba(0, 242, 255, 0.4); }
        #cartModal { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 94%; max-width: 520px; background: #1e293b; border: 2px solid var(--neon); border-radius: 40px; padding: 35px; display: none; z-index: 9999; box-shadow: 0 0 100px rgba(0,0,0,0.9); }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 50000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div style="background:#1e293b; padding:40px; border-radius:35px; border:2px solid var(--neon); width: 85%; max-width: 320px;">
            <h2 style="color:var(--neon); margin-top:0;">PŘIHLÁŠENÍ</h2>
            <input type="text" id="loginName" class="input-field" placeholder="Tvé jméno">
            <button id="loginBtn" class="btn-add-ticket">VSTOUPIT</button>
        </div>
    </div>

    <a href="admin.html" class="admin-lock">⚙️</a>
    <img src="IMG_8429.png" class="header-logo" alt="LOGO">

    <div class="bank-box">
        <span class="bank-label">Maximální výhra pro dnešek</span>
        <div class="bank-main-val"><span id="uiMainBank">0</span> Kč</div>
        <div id="userWelcome" style="margin-top:15px; color:var(--neon); font-weight:bold; letter-spacing:1px;"></div>
    </div>

    <a href="statistiky.html" class="btn-stats">📊 ŽEBŘÍČKY A STATISTIKY</a>

    <div id="matchList"></div>

    <div id="fabCart" class="fab-cart" onclick="uiOpenCart()">
        🎟️ <div id="fabBadge" style="position:absolute; top:-5px; right:-5px; background:#ff4444; color:white; width:28px; height:28px; border-radius:50%; font-size:0.5em; display:flex; align-items:center; justify-content:center; border:3px solid var(--dark);">0</div>
    </div>

    <div id="cartModal">
        <span style="position:absolute; top:20px; right:35px; font-size:2.5em; cursor:pointer; opacity:0.4;" onclick="uiCloseCart()">×</span>
        <h2 style="color:var(--neon);">Tvůj tiket</h2>
        <div id="cartItemsContainer"></div>
        <div style="margin-top:20px; border-top:1px solid rgba(255,255,255,0.1); padding-top:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <span style="opacity:0.6;">Celková sázka:</span>
                <span id="uiCartTotal" style="font-size:1.8em; font-weight:900; color:var(--neon);">0 Kč</span>
            </div>
            <button class="btn-add-ticket" onclick="actionSendTicket()">ODESLAT TIKET</button>
        </div>
    </div>

    <script type="module">
        import { AuthService } from './js/auth.js';
        import { DBService } from './js/database.js';

        let localCart = {};
        let activeDeadlines = {};

        // 1. LOGIN LOGIKA (V2)
        const user = AuthService.getUser();
        if (!user) {
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('loginBtn').onclick = () => {
                const name = document.getElementById('loginName').value.trim();
                if (name) {
                    AuthService.setUser(name);
                    location.reload();
                }
            };
        } else {
            document.getElementById('userWelcome').innerText = `HRÁČ: ${user.name.toUpperCase()}`;
        }

        // 2. NAČÍTÁNÍ DAT (V2 sahá do sazkyData_v2)
        DBService.getBank(val => document.getElementById('uiMainBank').innerText = val);

        DBService.getMatches(zapasy => {
            const container = document.getElementById('matchList');
            container.innerHTML = "";
            if (!zapasy) return;

            Object.entries(zapasy).forEach(([id, m]) => {
                activeDeadlines[id] = m.deadline;
                const isEvaluated = m.status === "vyhodnoceno";
                const now = Date.now();
                const target = new Date(m.deadline).getTime();
                const isClosed = now > target;

                const card = document.createElement('div');
                card.className = "match-card";
                card.onclick = () => uiToggleMatch(id);
                
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;">
                        <div style="color:var(--neon); font-size:0.75em; font-weight:900;">MATCH ID: ${id.substring(0,5)}</div>
                        ${isEvaluated ? `<div style="background:#27ae60; padding:5px 15px; border-radius:100px; font-size:0.8em;">VÝSLEDEK ${m.vysledek}</div>` : `<div id="timer-${id}" class="timer-box" style="color:var(--neon); font-weight:bold;">--:--:--</div>`}
                    </div>
                    <div class="flags-wrapper">
                        <div class="flag-container"><img class="flag-img" src="https://flagcdn.com/w160/${m.kodD}.png"><br><small>${m.domaci}</small></div>
                        <div class="vs-circle">VS</div>
                        <div class="flag-container"><img class="flag-img" src="https://flagcdn.com/w160/${m.kodH}.png"><br><small>${m.hoste}</small></div>
                    </div>
                    <div id="detail-${id}" class="details" style="display:none; margin-top:25px; padding-top:25px; border-top:1px solid rgba(255,255,255,0.1);" onclick="event.stopPropagation()">
                        ${(!isClosed && !isEvaluated) ? `
                            <div class="score-row">
                                <input type="number" id="scD-${id}" class="score-input" placeholder="0">
                                <span style="font-size:2.5em; font-weight:900; color:var(--neon)">:</span>
                                <input type="number" id="scH-${id}" class="score-input" placeholder="0">
                            </div>
                            <input type="text" id="striker-${id}" class="input-field" placeholder="Kdo dá gól? (příjmení)">
                            <button class="btn-add-ticket" onclick="actionAddToTicket('${id}', '${m.domaci} vs ${m.hoste}')">PŘIDAT NA TIKET (20 Kč)</button>
                        ` : `<div style="color:var(--neon); font-weight:900;">SÁZKY UZAVŘENY</div>`}
                        <div id="bets-list-${id}" style="margin-top:20px;"></div>
                    </div>
                `;
                container.appendChild(card);

                // Zobrazení existujících sázek z v2 větve
                if (m.sazky) {
                    const bList = document.getElementById(`bets-list-${id}`);
                    Object.values(m.sazky).forEach(s => {
                        bList.innerHTML += `<div style="background:rgba(255,255,255,0.03); margin-bottom:5px; padding:10px; border-radius:10px; display:flex; justify-content:space-between; font-size:0.9em;">
                            <span>${s.stav || '⏳'} ${s.jmeno}</span>
                            <span style="color:var(--neon); font-weight:bold;">${s.skore || s.tip}</span>
                        </div>`;
                    });
                }
            });
        });

        // 3. UI FUNKCE
        window.uiToggleMatch = (id) => {
            const el = document.getElementById(`detail-${id}`);
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        };

        window.actionAddToTicket = (id, mName) => {
            const sD = document.getElementById(`scD-${id}`).value;
            const sH = document.getElementById(`scH-${id}`).value;
            const str = document.getElementById(`striker-${id}`).value;
            if (sD === "" || sH === "" || !str) return alert("Doplň tip i střelce!");

            localCart[id] = { tip: `${sD}:${sH}`, strelec: str, matchName: mName };
            document.getElementById('fabCart').style.display = 'flex';
            document.getElementById('fabBadge').innerText = Object.keys(localCart).length;
            alert("Přidáno na tiket.");
        };

        window.uiOpenCart = () => {
            const container = document.getElementById('cartItemsContainer');
            container.innerHTML = "";
            let sum = 0;
            Object.entries(localCart).forEach(([id, data]) => {
                sum += 20;
                container.innerHTML += `<div style="text-align:left; background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-bottom:10px;">
                    <small style="opacity:0.5;">${data.matchName}</small><br>
                    <strong>${data.tip}</strong> - ${data.strelec}
                </div>`;
            });
            document.getElementById('uiCartTotal').innerText = `${sum} Kč`;
            document.getElementById('cartModal').style.display = 'block';
        };

        window.uiCloseCart = () => document.getElementById('cartModal').style.display = 'none';

        window.actionSendTicket = async () => {
            if (confirm("Odeslat sázky?")) {
                try {
                    await DBService.sendTicket(localCart);
                    alert("Tiket úspěšně odeslán!");
                    location.reload();
                } catch (e) {
                    alert(e.message);
                }
            }
        };

        // 4. TIMERY
        setInterval(() => {
            const now = Date.now();
            Object.entries(activeDeadlines).forEach(([id, dl]) => {
                const el = document.getElementById(`timer-${id}`);
                if (!el) return;
                const diff = new Date(dl).getTime() - now;
                if (diff <= 0) {
                    el.innerText = "🔐 UZAVŘENO";
                    el.style.color = "#ff4444";
                } else {
                    const h = Math.floor(diff / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    el.innerText = `⏱️ ${h}:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                }
            });
        }, 1000);
    </script>

    <script src="js/notifications.js"></script>
</body>
</html>
