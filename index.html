<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SÁZKOVKA NADĚJE v2.0</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="IMG_8429.png">

    <script>
        (function(w,d, s, id) {
            if(typeof(w.webpushr)!=='undefined') return;
            w.webpushr=w.webpushr||function(){(w.webpushr.q=w.webpushr.q||[]).push(arguments)};
            var js, fjs = d.getElementsByTagName(s)[0];
            js = d.createElement(s); js.id = id; js.async=1;
            js.src = "https://cdn.webpushr.com/app.min.js";
            fjs.parentNode.appendChild(js);
        }(window,document, 'script', 'webpushr-jssdk'));

        webpushr('setup', {
            'key': 'BAxBwXCacLqMoyihibIMbRI7cZ9HyPD_wd5JRpPBc3MXk9VEezuI_vVR2rfNLuTJ-2-gsnY48LYSToWdz9bTClc',
            'auto_prompt': false
        });
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --neon: #00f2ff; --dark: #0f172a; --card-bg: rgba(255, 255, 255, 0.05); }
        body { background-color: var(--dark); color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; text-align: center; }
        
        /* Admin Gear */
        .admin-gear { position: fixed; top: 20px; right: 20px; font-size: 1.8em; text-decoration: none; z-index: 10000; filter: drop-shadow(0 0 5px var(--neon)); }
        
        .header-logo { max-width: 450px; width: 90%; margin: 40px 0 20px 0; filter: drop-shadow(0 0 10px var(--neon)); }
        
        /* Bank & Tabs */
        .bank-box { background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(0,242,255,0.08) 100%); border: 1px solid rgba(0, 242, 255, 0.4); border-radius: 30px; padding: 25px; margin-bottom: 20px; }
        .bank-main-val { font-size: 2.8em; font-weight: 900; text-shadow: 0 0 20px var(--neon); }

        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .nav-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .nav-btn.active { background: var(--neon); color: var(--dark); border-color: var(--neon); }

        /* Match Cards */
        .section { display: none; width: 100%; max-width: 600px; margin: 0 auto; }
        .section.active { display: block; }

        .match-card { background: var(--card-bg); border-radius: 30px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 20px; padding: 25px; }
        .flags-wrapper { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 15px 0; }
        .flag-img { width: 70px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .vs-circle { background: var(--neon); color: var(--dark); border-radius: 50%; width: 35px; height: 35px; line-height: 35px; font-weight: 900; font-size: 0.8em; }

        /* Leaderboard */
        .leaderboard-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 20px; overflow: hidden; margin-top: 10px; }
        .leaderboard-table th { background: rgba(0, 242, 255, 0.1); color: var(--neon); padding: 15px; font-size: 0.8em; text-transform: uppercase; }
        .leaderboard-table td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rank-1 { color: #ffd700; font-weight: bold; }

        /* Inputs & Buttons */
        .score-input { width: 60px; height: 50px; text-align: center; font-weight: 900; font-size: 1.5em; background: #000; border: 2px solid #334155; color: white; border-radius: 12px; }
        .input-field { width: 100%; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); color: white; border-radius: 15px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-primary { width: 100%; background: var(--neon); color: var(--dark); border: none; padding: 18px; border-radius: 15px; font-weight: 900; cursor: pointer; }

        .fab-cart { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; background: var(--neon); color: var(--dark); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 1.8em; z-index: 5000; box-shadow: 0 10px 30px rgba(0,242,255,0.4); }
        #loginOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--dark); z-index:40000; display:none; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <a href="admin.html" class="admin-gear">⚙️</a>

    <div id="loginOverlay">
        <div style="background:#1e293b; padding:35px; border-radius:25px; text-align:center; border:2px solid var(--neon); width: 85%; max-width: 300px;">
            <h2 style="color:var(--neon); margin-top:0;">PŘIHLÁŠENÍ</h2>
            <input type="text" id="loginName" class="input-field" placeholder="Tvoje přezdívka">
            <button id="loginBtn" class="btn-primary">VSTOUPIT</button>
        </div>
    </div>

    <img src="IMG_8429.png" class="header-logo" alt="LOGO">

    <div class="bank-box">
        <div class="bank-main-val"><span id="uiMainBank">0</span> Kč</div>
        <div id="userWelcome" style="margin-top:10px; color:var(--neon); font-size: 0.9em;"></div>
    </div>

    <div class="nav-tabs">
        <button class="nav-btn active" onclick="showSection('matches', this)">ZÁPASY</button>
        <button class="nav-btn" onclick="showSection('ranking', this)">ŽEBŘÍČEK</button>
    </div>

    <div id="section-matches" class="section active">
        <div id="matchList">Načítám...</div>
    </div>

    <div id="section-ranking" class="section">
        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>Pozice</th>
                    <th>Hráč</th>
                    <th>Bank</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody">
                </tbody>
        </table>
    </div>

    <div id="fabCart" class="fab-cart">🎟️ <div id="fabBadge" style="position:absolute; top:-5px; right:-5px; background:red; color:white; border-radius:50%; width:25px; height:25px; font-size:12px; display:flex; align-items:center; justify-content:center; font-weight:bold;">0</div></div>

    <script type="module">
        import { AuthService } from './js/auth.js';
        import { DBService } from './js/database.js';

        let cart = {};

        // Login Logic
        const loginOverlay = document.getElementById('loginOverlay');
        let user = AuthService.getUser();
        
        if (!user) {
            loginOverlay.style.display = 'flex';
            document.getElementById('loginBtn').onclick = () => {
                const name = document.getElementById('loginName').value.trim();
                if (name) {
                    user = AuthService.setUser(name);
                    loginOverlay.style.display = 'none';
                    location.reload();
                }
            };
        } else {
            document.getElementById('userWelcome').innerText = `Hráč: ${user.name}`;
        }

        // Tab Switching
        window.showSection = (sectionId, btn) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`section-${sectionId}`).classList.add('active');
            btn.classList.add('active');
        };

        // Load Bank
        DBService.getBank(val => document.getElementById('uiMainBank').innerText = val);

        // Load Match List
        DBService.getMatches(zapasy => {
            const container = document.getElementById('matchList');
            container.innerHTML = "";
            if (!zapasy) return container.innerHTML = "Žádné aktivní zápasy.";

            Object.entries(zapasy).forEach(([id, m]) => {
                if(m.status === "vyhodnoceno") return;
                const card = document.createElement('div');
                card.className = "match-card";
                card.innerHTML = `
                    <div style="color:var(--neon); font-size:0.7em; margin-bottom:10px; font-weight:bold; letter-spacing:1px;">TIPNI SI VÝSLEDEK</div>
                    <div class="flags-wrapper">
                        <div><img class="flag-img" src="https://flagcdn.com/w160/${m.kodD}.png"><br><small>${m.domaci}</small></div>
                        <div class="vs-circle">VS</div>
                        <div><img class="flag-img" src="https://flagcdn.com/w160/${m.kodH}.png"><br><small>${m.hoste}</small></div>
                    </div>
                    <div class="score-row">
                        <input type="number" id="scD-${id}" class="score-input" placeholder="0">
                        <span style="font-size:2em; color:var(--neon)">:</span>
                        <input type="number" id="scH-${id}" class="score-input" placeholder="0">
                    </div>
                    <input type="text" id="striker-${id}" class="input-field" placeholder="Střelec gólu">
                    <button class="btn-primary" onclick="addToCart('${id}')">PŘIDAT NA TIKET (20 Kč)</button>
                `;
                container.appendChild(card);
            });
        });

        // Cart Logic
        window.addToCart = (id) => {
            const sD = document.getElementById(`scD-${id}`).value;
            const sH = document.getElementById(`scH-${id}`).value;
            const str = document.getElementById(`striker-${id}`).value;
            if(sD === "" || sH === "" || !str) return alert("Musíš vyplnit vše!");
            
            cart[id] = { tip: `${sD}:${sH}`, strelec: str };
            document.getElementById('fabCart').style.display = 'flex';
            document.getElementById('fabBadge').innerText = Object.keys(cart).length;
            alert("Přidáno na tiket!");
        };

        document.getElementById('fabCart').onclick = async () => {
            if (confirm("Odeslat tiket za " + (Object.keys(cart).length * 20) + " Kč?")) {
                await DBService.sendTicket(cart);
                alert("Tiket byl úspěšně podán!");
                location.reload();
            }
        };

        // Leaderboard Logic
        DBService.getLeaderboard(users => {
            const body = document.getElementById('leaderboardBody');
            body.innerHTML = "";
            const sorted = Object.entries(users).sort((a,b) => b[1].bank - a[1].bank);
            
            sorted.forEach(([id, u], index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="rank-${index+1}">${index+1}.</td>
                    <td>${u.name}</td>
                    <td style="font-weight:bold;">${u.bank} Kč</td>
                `;
                body.appendChild(row);
            });
        });
    </script>

    <script src="js/notifications.js"></script>
</body>
</html>
